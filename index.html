function ritaAllt(){
  if(SPEL.lage==='lobby'){ ritaLobby(); return; }
  // bakgrund utanför världsromben
  g.fillStyle = SPEL.fas==='dag'? '#14231a' : '#0a0c1e';
  g.fillRect(0,0,VIEW_W,VIEW_H);
  g.save();
  let ox = -Math.round(kamX), oy = -Math.round(kamY);
  if(skakT>0){ ox += slump(-skakA,skakA); oy += slump(-skakA,skakA); }
  g.translate(ox,oy);
  ritaMarkIso();
  // djuplista (nyckel = x+y i världspixlar — främre hörn ritas sist)
  const lista = [];
  const s0 = Math.max(0, Math.floor(kamY/16)-4), s1 = Math.min(MAPW+MAPH-2, Math.ceil((kamY+VIEW_H)/16)+9);
  const d0 = Math.floor(kamX/32)-3, d1 = Math.ceil((kamX+VIEW_W)/32)+3;
  for(let s=s0; s<=s1; s++){
    let d = d0 + (((d0+s)%2!==0)?1:0);
    for(; d<=d1; d+=2){
      const tx = (s+d)/2, ty2 = (s-d)/2;
      if(!inne(tx,ty2)) continue;
      const o = obj[idx(tx,ty2)];
      if(o===O_TALL) lista.push({d:(tx+ty2+1.6)*TS, fn:ritaTallIso, a:tx, b:ty2});
      else if(o===O_STEN) lista.push({d:(tx+ty2+1.3)*TS, fn:ritaStenIso, a:tx, b:ty2});
      else if(arMalm(o)) lista.push({d:(tx+ty2+1.3)*TS, fn:ritaMalmIso, a:tx, b:ty2});
      else if(o===O_BAR) lista.push({d:(tx+ty2+1.1)*TS, fn:ritaBarIso, a:tx, b:ty2});
      else if(o===O_KISTA) lista.push({d:(tx+ty2+1.1)*TS, fn:ritaKistaIso, a:tx, b:ty2});
    }
  }
  for(const b of byggnader){
    if(!b || b.typ==='aker') continue;   // åkern ritades i markpasset
    const bx = isoSX(b.tx*TS, b.ty*TS);
    if(bx < kamX-260 || bx > kamX+VIEW_W+260) continue;
    const by = (b.tx+b.ty)*12;
    if(by < kamY-200 || by > kamY+VIEW_H+160) continue;
    lista.push({d:(b.tx+b.ty+(b.def.w+b.def.h)/2)*TS, fn:ritaByggIso, a:b});
  }
  for(const f of folket) if(!f.gomd) lista.push({d:f.x+f.y, fn:ritaFolk, a:f});
  for(const m of mobbar) lista.push({d:m.x+m.y, fn:ritaMob, a:m});
  for(const h of hjaltar) lista.push({d:h.x+h.y, fn:ritaHjalte, a:h});
  lista.sort((p,q)=>p.d-q.d);
  for(const e of lista) e.fn(e.a, e.b);
  for(const p of pilar) ritaPil(p);
  ritaPartiklar();
  for(const h of hjaltar) if(h.byggPa && h.nere<=0) ritaByggUI(h);
  for(const b of byggnader){
    if(!b || b.typ!=='smedja') continue;
    const cx = (b.tx+b.def.w/2)*TS, cy = (b.ty+b.def.h/2)*TS;
    if(hjaltar.some(h=>avst(h.x,h.y,cx,cy)<90)) ritaSmedjeUI(b);
  }
  for(const t of texter){
    g.globalAlpha = kl(1.6-t.t,0,1);
    utext(t.txt, isoSX(t.x,t.y), isoSY(t.x,t.y) - 20 - t.t*26, t.stor?15:11, t.farg);
    g.globalAlpha = 1;
  }
  ritaMorker();
  g.restore();
  ritaHUD();
  vantar.forEach((jr,i)=>{
    const ch = HJALTAR_DEF[jr.ci];
    ritaPanel(VIEW_W/2-160, VIEW_H-46-i*34, 320, 28);
    utext('NY SPELARE: ◄ ► välj', VIEW_W/2-72, VIEW_H-32-i*34, 11, '#efe6d0');
    utext(ch.namn, VIEW_W/2+22, VIEW_H-32-i*34, 12, ch.farg);
    utext('YXA = hoppa in!', VIEW_W/2+108, VIEW_H-32-i*34, 10, '#ffd97a');
  });
  if(SPEL.lage==='slut') ritaSlut();
  if(SPEL.seger && SPEL.segerT<8) ritaSegerBanner();
  if(SPEL.paus) ritaPaus();
}
</script>
<script>
'use strict';
/* ===================== SPELLOGIK: HJÄLTAR, BYGGE & BYBOR ===================== */

/* ---- input: tangentbord, lokal pekskärm, gamepad, nätmobiler ---- */
const TANGENT = {}, TLATCH = {a:false,b:false,c:false,x:0};
window.addEventListener('keydown', e=>{
  if(e.repeat) return;
  TANGENT[e.code] = true;
  if(e.code==='KeyJ'||e.code==='KeyZ'||e.code==='Space') TLATCH.a = true;
  if(e.code==='KeyK'||e.code==='KeyX'||e.code==='KeyB') TLATCH.b = true;
  if(e.code==='KeyL'||e.code==='KeyC'||e.code==='KeyV') TLATCH.c = true;
  if(e.code==='ArrowLeft') TLATCH.x = -1;
  if(e.code==='ArrowRight') TLATCH.x = 1;
  if(e.code==='KeyM') musikPa = !musikPa;
  if((e.code==='KeyP'||e.code==='Escape') && SPEL.lage==='spel') SPEL.paus = !SPEL.paus;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  vackLjud();
});
window.addEventListener('keyup', e=>{ TANGENT[e.code] = false; });
const PEKPAD = {x:0,y:0,a:false,b:false,c:false,aT:false,bT:false,cT:false,xT:0};
let GPFORR = {};
let gpCache = [];
function pollGamepads(){
  const ut = [];
  try{
    const gps = navigator.getGamepads? navigator.getGamepads() : [];
    for(let i=0;i<gps.length;i++){
      const gp = gps[i]; if(!gp) continue;
      const forr = GPFORR[i]||{a:false,b:false,c:false};
      let x = gp.axes[0]||0, y = gp.axes[1]||0;
      if(gp.buttons[14]&&gp.buttons[14].pressed) x = -1;
      if(gp.buttons[15]&&gp.buttons[15].pressed) x = 1;
      if(gp.buttons[12]&&gp.buttons[12].pressed) y = -1;
      if(gp.buttons[13]&&gp.buttons[13].pressed) y = 1;
      if(Math.abs(x)<0.25) x = 0; if(Math.abs(y)<0.25) y = 0;
      const a = !!(gp.buttons[0]&&gp.buttons[0].pressed)||!!(gp.buttons[2]&&gp.buttons[2].pressed);
      const b = !!(gp.buttons[1]&&gp.buttons[1].pressed);
      const c = !!(gp.buttons[3]&&gp.buttons[3].pressed);
      ut.push({id:'g'+i, x, y, aH:a,bH:b,cH:c, aT:a&&!forr.a, bT:b&&!forr.b, cT:c&&!forr.c});
      GPFORR[i] = {a,b,c};
    }
  }catch(e){}
  return ut;
}
function lasInput(pad){
  if(pad==='kb'){
    let x = 0, y = 0;
    if(TANGENT.ArrowLeft||TANGENT.KeyA) x -= 1;
    if(TANGENT.ArrowRight||TANGENT.KeyD) x += 1;
    if(TANGENT.ArrowUp||TANGENT.KeyW) y -= 1;
    if(TANGENT.ArrowDown||TANGENT.KeyS) y += 1;
    const r = {x,y, aT:TLATCH.a, bT:TLATCH.b, cT:TLATCH.c, xT:TLATCH.x,
      aH:!!(TANGENT.KeyJ||TANGENT.KeyZ||TANGENT.Space), bH:!!(TANGENT.KeyK||TANGENT.KeyX), cH:!!(TANGENT.KeyL||TANGENT.KeyC)};
    TLATCH.a = TLATCH.b = TLATCH.c = false; TLATCH.x = 0;
    return r;
  }
  if(pad==='lokal'){
    const r = {x:PEKPAD.x, y:PEKPAD.y, aT:PEKPAD.aT, bT:PEKPAD.bT, cT:PEKPAD.cT, xT:PEKPAD.xT||0,
      aH:PEKPAD.a, bH:PEKPAD.b, cH:PEKPAD.c};
    PEKPAD.aT = PEKPAD.bT = PEKPAD.cT = false; PEKPAD.xT = 0;
    return r;
  }
  if(pad && pad[0]==='g'){
    const gp = gpCache.find(q=>q.id===pad);
    return gp || {x:0,y:0,aT:false,bT:false,cT:false,aH:false,bH:false,cH:false,xT:0};
  }
  const s = LANK.pads[pad];
  if(s && s.vid){
    const st = s.st;
    const r = {x:st.x, y:st.y, aT:st.aT||false, bT:st.bT||false, cT:st.cT||false, xT:st.xT||0,
      aH:st.a, bH:st.b, cH:st.c};
    st.aT = st.bT = st.cT = false; st.xT = 0;
    return r;
  }
  return {x:0,y:0,aT:false,bT:false,cT:false,aH:false,bH:false,cH:false,xT:0};
}

/* ---- hjältar ---- */
const HJALTE_STAT = {
  sigrid:{hp:82, dmg:11, fart:150}, torbjorn:{hp:92, dmg:9, fart:140},
  ylva:{hp:64, dmg:7, fart:168}, rune:{hp:86, dmg:8, fart:145}, embla:{hp:70, dmg:7, fart:150},
};
function gorHjalte(ci, pad, slot){
  const ch = HJALTAR_DEF[ci], st = HJALTE_STAT[ch.id];
  const lh = byggnader.find(b=>b && b.typ==='langhus');
  const bx = lh? (lh.tx+1.5)*TS : PXW/2, by = lh? (lh.ty+lh.def.h)*TS+22 : PXH/2;
  return { slot, pad, ci, ch,
    x: bx-40+slot*22, y: by+8+(slot%2)*16, fx:0, fy:1, gang:0,
    hp: st.hp+SMIDE.brynjor*30, maxhp: st.hp+SMIDE.brynjor*30,
    atkT:0, atkMax:0.3, autoT:0, kraftCd:0, kraftMax:12,
    byggPa:false, bySel:0, nere:0, revP:0, blink:1.5 };
}
function skadaHjalte(h, dmg){
  if(h.blink>0 || h.nere>0) return;
  h.hp -= dmg; h.blink = 0.5;
  spela('aj');
  if(h.hp<=0){ h.hp = 0; h.nere = 15; h.revP = 0; h.byggPa = false; spela('nere');
    svavText(h.x, h.y-30, h.ch.namn+' är nere!', '#d94f3c', true); }
}
function skadaMob(m, dmg, fran){
  if(m.stenad>0) return;
  m.hp -= dmg;
  if(fran){ const d = Math.max(12, avst(fran.x,fran.y,m.x,m.y));
    m.x += (m.x-fran.x)/d*7; m.y += (m.y-fran.y)/d*7; }
  spela('traff');
  partiklar.push({x:m.x, y:m.y-8, vx:slump(-30,30), vy:slump(-60,-20), liv:0.4, farg:m.def.farg, st:3});
  if(m.hp<=0) dodaMob(m, true);
}
function framfor(h, d){ return [h.x + h.fx*d, h.y + h.fy*d - 6]; }

function byggRuta(h){
  const val = BYGGLISTA[h.bySel], def = BTYP[val];
  const fx2 = h.x + h.fx*TS*1.5, fy2 = h.y + h.fy*TS*1.5 - 6;
  return [ kl(Math.round(fx2/TS - def.w/2), 0, MAPW-def.w),
           kl(Math.round(fy2/TS - def.h/2), 0, MAPH-def.h) ];
}
function samlaKD(){ return Math.max(0.16, 0.42 * (1 - 0.14*SMIDE.yxor)); }
function heroDmg(h){ return h.ch.id==='ylva'? 9+2.6*SMIDE.vapen : HJALTE_STAT[h.ch.id].dmg*(1+0.32*SMIDE.vapen); }

function utforHandling(h){
  // 1) byggläge → placera
  if(h.byggPa){
    const val = BYGGLISTA[h.bySel], def = BTYP[val];
    const [gx,gy] = byggRuta(h);
    if(kanBygga(val,gx,gy) && harRad(def.kost)){
      placeraBygg(val,gx,gy);
      statistik.byggt++; spela('bygg');
      svavText((gx+def.w/2)*TS, gy*TS, def.namn+'!', '#8fd45a');
    } else spela('nej');
    return;
  }
  // 2) smedjans disk (träffytan räknas i iso-skärmrummet, samma som ritningen)
  for(const b of byggnader){
    if(!b || b.typ!=='smedja' || b.hp<=0) continue;
    const cwx = (b.tx+b.def.w/2)*TS, cwy = (b.ty+b.def.h/2)*TS;
    if(avst(h.x,h.y,cwx,cwy) > 90) continue;
    const scx = isoSX(cwx,cwy), shx = isoSX(h.x,h.y);
    let bast = -1, bd = 34;
    SMIDESLISTA.forEach((u,i)=>{
      const d = Math.abs(shx - (scx + (i-1.5)*64));
      if(d < bd){ bd = d; bast = i; }
    });
    if(bast>=0){
      const u = SMIDESLISTA[bast], niva = SMIDE[u.ny];
      if(niva>=u.kost.length){ spela('nej'); return; }
      const [res, antal] = u.kost[niva];
      if(RES[res] < antal){ spela('nej');
        svavText(h.x, h.y-30, 'Mer '+({jarn:'järn',brons:'brons',silver:'silver',guld:'guld'})[res]+' behövs!', '#d94f3c'); return; }
      RES[res] -= antal; SMIDE[u.ny]++;
      if(u.ny==='brynjor') for(const p of hjaltar){ p.maxhp += 25; p.hp += 25; }
      spela('kop'); svavText(cwx, cwy-20, u.namn+' nivå '+SMIDE[u.ny]+'!', '#ffd97a', true);
      return;
    }
  }
  // 2.5) skattkista inom räckhåll (generös radie — även mitt i strid)
  {
    const htx = Math.floor(h.x/TS), hty = Math.floor(h.y/TS);
    for(let ky=hty-2; ky<=hty+2; ky++) for(let kx=htx-2; kx<=htx+2; kx++){
      if(!inne(kx,ky) || obj[idx(kx,ky)]!==O_KISTA) continue;
      if(avst(h.x,h.y,kx*TS+12,ky*TS+12) > 40) continue;
      const LOOT = [['guld',3],['guld',2],['silver',4],['silver',3],['brons',3],['jarn',6],['mat',12],['tra',14]];
      const [lres, lant] = valfri(LOOT);
      RES[lres] += lant;
      obj[idx(kx,ky)] = O_TOM; miniSmutsig = true;
      spela('kop'); skaka(2,0.15);
      h.atkT = h.atkMax;
      svavText(kx*TS+12, ky*TS, '+'+lant+' '+({guld:'guld',silver:'silver',brons:'brons',jarn:'järn',mat:'mat',tra:'trä'})[lres]+'!', '#ffd97a', true);
      for(let i3=0;i3<10;i3++) partiklar.push({x:kx*TS+12,y:ky*TS+12,vx:slump(-60,60),vy:slump(-90,-30),liv:0.7,farg:'#ffe89a',st:3});
      return;
    }
  }
  h.atkT = h.atkMax;
  // 3) fiender nära → strid
  const narMob = mobbar.some(m=>m.stenad<=0 && avst(h.x,h.y,m.x,m.y) < 95);
  if(narMob){
    if(h.ch.id==='ylva'){
      let mal = null, bd = 260;
      for(const m of mobbar){ if(m.stenad>0) continue; const d = avst(h.x,h.y,m.x,m.y); if(d<bd){ bd = d; mal = m; } }
      const vinkel = mal? Math.atan2(mal.y-h.y, mal.x-h.x) : Math.atan2(h.fy,h.fx);
      pilar.push({typ:'pil', x:h.x, y:h.y-12, vx:Math.cos(vinkel)*330, vy:Math.sin(vinkel)*330, dmg:heroDmg(h), liv:1, fran:h});
      spela('pil');
    } else {
      const [ax,ay] = framfor(h, 20);
      let traf = false;
      for(const m of mobbar){
        if(m.stenad>0) continue;
        if(avst(ax,ay,m.x,m.y) < 34+m.def.r){ skadaMob(m, heroDmg(h), h); traf = true; }
      }
      spela(traf? 'traff':'svard');
    }
    return;
  }
  // 4) naturresurs / skattkista framför
  const [px2,py2] = framfor(h, 20);
  const tx = Math.floor(px2/TS), ty2 = Math.floor(py2/TS);
  if(inne(tx,ty2)){
    const i2 = idx(tx,ty2), o = obj[i2];
    if(o===O_TALL || arMalm(o) || (o===O_BAR && objHP[i2]>0)){
      const dubbel = (h.ch.id==='torbjorn' && o===O_TALL)? 2 : 1;
      objHP[i2] -= dubbel;
      let vinst = 0, sort = '';
      if(o===O_TALL){ vinst = 2*dubbel; sort = 'tra'; spela('yxa');
        partiklar.push({x:px2,y:py2-8,vx:slump(-40,40),vy:slump(-70,-20),liv:0.5,farg:'#8a6337',st:3}); }
      else if(o===O_BAR){ vinst = 4; sort = 'mat'; spela('bar'); }
      else { const md = MALMDATA[o]; vinst = md.vinst; sort = md.res;
        spela(o===O_STEN?'sten':'malm'); }
      RES[sort] += vinst;
      const FARG = {tra:'#c9a06a',sten:'#b8b8c2',jarn:'#e8825a',koppar:'#f0a868',tenn:'#cdd6dd',
        silver:'#f6fcff',guld:'#ffe89a',mat:'#e8c86a'};
      svavText(px2, py2-14, '+'+vinst, FARG[sort]);
      if(objHP[i2]<=0){
        if(o===O_TALL){ obj[i2] = O_STUBBE; RES.tra += 2; aterVax[i2] = 75; spela('krossa');
          for(let i3=0;i3<8;i3++) partiklar.push({x:tx*TS+12,y:ty2*TS+8,vx:slump(-50,50),vy:slump(-80,-10),liv:0.6,farg:'#2a7040',st:3}); }
        else if(o===O_BAR){ objHP[i2] = 0; aterVax[i2] = 45; }
        else obj[i2] = O_GRUS;
        flowSmutsig = true; miniSmutsig = true;
      }
      return;
    }
    // 5) laga byggnad framför
    const b = bygget(tx,ty2);
    if(b && b.hp < b.maxhp){
      const kraft2 = h.ch.id==='rune'? 18 : 8;
      b.hp = Math.min(b.maxhp, b.hp + kraft2);
      spela('laga');
      partiklar.push({x:px2,y:py2-10,vx:slump(-20,20),vy:-40,liv:0.4,farg:'#ffd97a',st:2});
      return;
    }
  }
  spela('svard');
}

function anvandKraft(h){
  if(h.kraftCd>0 || h.byggPa){ if(h.kraftCd>0) spela('nej'); return; }
  h.kraftCd = h.kraftMax; h.atkT = 0.45;
  const id = h.ch.id;
  svavText(h.x, h.y-40, h.ch.kraft+'!', h.ch.farg, true);
  if(id==='sigrid'){
    spela('svard'); spela('traff'); skaka(3,0.2);
    for(const m of mobbar) if(m.stenad<=0 && avst(h.x,h.y,m.x,m.y)<70) skadaMob(m, heroDmg(h)*2.4, h);
    for(let i=0;i<14;i++){ const v = i/14*Math.PI*2;
      partiklar.push({x:h.x+Math.cos(v)*30, y:h.y-8+Math.sin(v)*30, vx:Math.cos(v)*80, vy:Math.sin(v)*80, liv:0.4, farg:'#8fd4ff', st:3}); }
  }
  if(id==='torbjorn'){
    spela('krossa'); skaka(4,0.25);
    const t0x = Math.floor((h.x-58)/TS), t1x = Math.floor((h.x+58)/TS);
    const t0y = Math.floor((h.y-58)/TS), t1y = Math.floor((h.y+58)/TS);
    let virke = 0;
    for(let yy=t0y; yy<=t1y; yy++) for(let xx=t0x; xx<=t1x; xx++){
      if(!inne(xx,yy) || obj[idx(xx,yy)]!==O_TALL) continue;
      obj[idx(xx,yy)] = O_STUBBE; aterVax[idx(xx,yy)] = 75; virke += 6;
      for(let i3=0;i3<6;i3++) partiklar.push({x:xx*TS+12,y:yy*TS+8,vx:slump(-50,50),vy:slump(-80,-10),liv:0.6,farg:'#2a7040',st:3});
    }
    if(virke){ RES.tra += virke; svavText(h.x, h.y-56, '+'+virke+' trä!', '#c9a06a', true); flowSmutsig = true; miniSmutsig = true; }
    for(const m of mobbar) if(m.stenad<=0 && avst(h.x,h.y,m.x,m.y)<60) skadaMob(m, heroDmg(h)*2, h);
  }
  if(id==='ylva'){
    spela('pil');
    const bas = Math.atan2(h.fy, h.fx);
    for(let i=0;i<9;i++){
      const v = bas + (i-4)*0.16;
      pilar.push({typ:'pil', x:h.x, y:h.y-12, vx:Math.cos(v)*310, vy:Math.sin(v)*310, dmg:heroDmg(h), liv:1.1, fran:h});
    }
  }
  if(id==='rune'){
    spela('bygg'); skaka(3,0.2);
    let lagat = 0;
    for(const b of byggnader){
      if(!b || b.hp>=b.maxhp) continue;
      const cx = (b.tx+b.def.w/2)*TS, cy = (b.ty+b.def.h/2)*TS;
      if(avst(h.x,h.y,cx,cy)<110){ b.hp = Math.min(b.maxhp, b.hp+55); lagat++;
        partiklar.push({x:cx,y:cy-10,vx:0,vy:-40,liv:0.6,farg:'#ffd97a',st:4}); }
    }
    for(const m of mobbar) if(m.stenad<=0 && avst(h.x,h.y,m.x,m.y)<70){ m.stun = 2.2; skadaMob(m, 6, h); }
    if(lagat) svavText(h.x, h.y-56, lagat+' byggnader lagade!', '#ffd97a');
  }
  if(id==='embla'){
    spela('hjarta');
    for(const p of hjaltar){
      if(avst(h.x,h.y,p.x,p.y)>120) continue;
      if(p.nere>0){ p.nere = 0; p.hp = p.maxhp*0.5; p.blink = 2; spela('uppe'); svavText(p.x,p.y-30,'Uppe igen!','#8fd45a'); }
      else p.hp = Math.min(p.maxhp, p.hp+32);
      partiklar.push({x:p.x,y:p.y-20,vx:0,vy:-30,liv:0.7,farg:'#e893b8',st:4});
    }
    for(const f of folket) if(!f.gomd && avst(h.x,h.y,f.x,f.y)<120) f.hp = f.maxhp;
  }
}

function uppdHjalte(h, dt){
  const inp = lasInput(h.pad);
  h.blink = Math.max(0, h.blink-dt);
  h.atkT = Math.max(0, h.atkT-dt);
  h.autoT = Math.max(0, h.autoT-dt);
  h.kraftCd = Math.max(0, h.kraftCd-dt);
  if(h.nere>0){
    h.nere -= dt;
    // kompis intill som håller YXA hjälper upp
    let hjalp = false;
    for(const p of hjaltar){
      if(p===h || p.nere>0) continue;
      if(avst(h.x,h.y,p.x,p.y)<30 && lasInputTitt(p.pad).aH) hjalp = true;
    }
    if(hjalp){ h.revP += dt/1.7;
      if(h.revP>=1){ h.nere = 0; h.hp = h.maxhp*0.6; h.blink = 2; h.revP = 0; spela('uppe');
        svavText(h.x,h.y-30,'Uppe igen!','#8fd45a'); } }
    else h.revP = Math.max(0, h.revP-dt*0.6);
    if(h.nere<=0 && h.hp<=0){
      // buren till Långhuset
      const lh = byggnader.find(b=>b && b.typ==='langhus');
      if(lh){ h.x = (lh.tx+1.5)*TS; h.y = (lh.ty+lh.def.h)*TS+20; }
      h.hp = h.maxhp*0.5; h.blink = 2.5; spela('uppe');
    }
    return;
  }
  // gå — spaken är skärmrelativ: upp på skärmen = nordväst i iso-världen
  let dx = inp.x, dy = inp.y;
  let langd2 = Math.hypot(dx,dy);
  if(langd2>1){ dx/=langd2; dy/=langd2; langd2 = 1; }
  const wdx = (dx+dy)*0.7071, wdy = (dy-dx)*0.7071;
  const fart = HJALTE_STAT[h.ch.id].fart;
  h.ror = langd2>0.1;
  if(h.ror){
    flyttaEnhet(h, wdx*fart*dt, wdy*fart*dt, 8, false);
    h.gang += dt;
    const wl = Math.hypot(wdx,wdy)||1;
    h.fx = wdx/wl; h.fy = wdy/wl;
  }
  // knappar
  if(inp.bT){ h.byggPa = !h.byggPa; spela('valj'); }
  if(h.byggPa && inp.bT===false && false){} // (bT hanteras ovan: växlar läge)
  if(h.byggPa){
    // i byggläge: BYGG bläddrar vidare (andra trycket och framåt), KRAFT avbryter
    if(inp.bT){ /* redan hanterat som toggle — se nedan */ }
    if(inp.cT){ h.byggPa = false; spela('valj'); }
  } else if(inp.cT) anvandKraft(h);
  if(inp.aT || (inp.aH && h.autoT<=0)){
    h.autoT = samlaKD();
    utforHandling(h);
  }
  // helning nära Långhuset (kostar mat) eller vid brunn (gratis)
  const lh = byggnader.find(b=>b && b.typ==='langhus');
  if(lh && h.hp<h.maxhp && RES.mat>0.5){
    const cx = (lh.tx+1.5)*TS, cy = (lh.ty+1.5)*TS;
    if(avst(h.x,h.y,cx,cy)<70){ h.hp = Math.min(h.maxhp, h.hp+5*dt); RES.mat = Math.max(0, RES.mat-0.5*dt); }
  }
  if(h.hp<h.maxhp){
    for(const b of byggnader){
      if(!b || b.typ!=='brunn' || b.hp<=0) continue;
      if(avst(h.x,h.y,(b.tx+0.5)*TS,(b.ty+0.5)*TS)<55){ h.hp = Math.min(h.maxhp, h.hp+6*dt); break; }
    }
  }
  // Embla helar passivt intill
  if(h.ch.id==='embla'){
    for(const p of hjaltar) if(p!==h && p.nere<=0 && avst(h.x,h.y,p.x,p.y)<64)
      p.hp = Math.min(p.maxhp, p.hp+2.2*dt);
  }
}
// titta på hålläget utan att äta upp tap-latcharna
function lasInputTitt(pad){
  if(pad==='kb') return {aH:!!(TANGENT.KeyJ||TANGENT.KeyZ||TANGENT.Space)};
  if(pad==='lokal') return {aH:PEKPAD.a};
  if(pad && pad[0]==='g'){ const gp = gpCache.find(q=>q.id===pad); return {aH:gp? gp.aH:false}; }
  const s = LANK.pads[pad];
  return {aH: s && s.vid ? s.st.a : false};
}

/* ---- byggläge: bläddra med BYGG kräver särskild ordning ---- */
// (bT togglar in/ut ovan; för att bläddra används i stället: när byggläget är PÅ
//  tolkas nästa bT som "nästa byggnad" — det sköts här genom att wrappa uppdHjalte)
const _uppdHjalte0 = uppdHjalte;
uppdHjalte = function(h, dt){
  // snappa upp bT innan grundfunktionen äter den, när byggläget redan är på
  if(h.nere<=0 && h.byggPa){
    const s = tittaTap(h.pad, 'b');
    if(s){ h.bySel = (h.bySel+1)%BYGGLISTA.length; spela('valj'); }
  }
  _uppdHjalte0(h, dt);
};
function tittaTap(pad, knapp){
  if(pad==='kb'){ const v = TLATCH[knapp==='b'?'b':knapp]; if(v){ TLATCH[knapp] = false; return true; } return false; }
  if(pad==='lokal'){ const nyckel = knapp+'T'; if(PEKPAD[nyckel]){ PEKPAD[nyckel] = false; return true; } return false; }
  if(pad && pad[0]==='g'){ const gp = gpCache.find(q=>q.id===pad); if(gp && gp[knapp+'T']){ gp[knapp+'T'] = false; return true; } return false; }
  const s = LANK.pads[pad];
  if(s && s.vid && s.st[knapp+'T']){ s.st[knapp+'T'] = false; return true; }
  return false;
}

/* ---- byborna ---- */
function folkTak(){ return 3 + 2*byggnader.filter(b=>b && b.typ==='stuga' && b.hp>0).length; }
function gorFolk(x,y){
  return { x, y, hp:26, maxhp:26, jobb:null, hem:null, fas:'ledig', rutt:null, ri:0,
    mal:null, malI:-1, arbT:0, bar:null, barN:0, gang:0, gomd:false, vantaT:0, gomdI:null };
}
function foddFolk(){
  const lh = byggnader.find(b=>b && b.typ==='langhus');
  if(!lh) return;
  const f = gorFolk((lh.tx+1.5)*TS+slump(-10,10), (lh.ty+lh.def.h)*TS+14);
  folket.push(f); statistik.folkFott++;
  spela('folk'); svavText(f.x, f.y-26, 'En ny bybo!', '#efe6d0');
}
function fordelaJobb(){
  for(const b of byggnader){
    if(!b || !b.def.jobb || b.hp<=0 || (b.arb && b.arb.hp>0)) continue;
    let bast = null, bd = 1e9;
    for(const f of folket){
      if(f.jobb || f.gomd) continue;
      const d = avst(f.x,f.y,(b.tx+1)*TS,(b.ty+1)*TS);
      if(d<bd){ bd = d; bast = f; }
    }
    if(bast){ bast.jobb = b.def.jobb; bast.hem = b; b.arb = bast; bast.fas = 'gaJobb'; bast.rutt = null; }
  }
}
const JOBB_OBJ = { ved:O_TALL, sten:O_STEN, malm:[O_MALM,O_KOPPAR,O_TENN,O_SILVER,O_GULD] };
function foljRutt(f, dt, fart){
  if(!f.rutt || f.ri>=f.rutt.length){
    if(!f.mal) return false;
    f.rutt = sokVag(Math.floor(f.x/TS), Math.floor(f.y/TS), f.mal[0], f.mal[1]);
    f.ri = 0;
    if(!f.rutt){ f.vantaT = 2.5; f.mal = null; return false; }
  }
  const wp = f.rutt[f.ri];
  if(!wp) return true;
  const mx = wp[0]*TS+TS/2, my = wp[1]*TS+TS/2;
  const d = avst(f.x,f.y,mx,my);
  if(d<5){ f.ri++; if(f.ri>=f.rutt.length) return true; return false; }
  f.rikt = oktantRad(mx-f.x, my-f.y);
  f.x += (mx-f.x)/d*fart*dt; f.y += (my-f.y)/d*fart*dt;
  f.gang += dt;
  return false;
}
function uppdFolk(f, dt){
  f.vantaT = Math.max(0, f.vantaT-dt);
  // natten: spring och göm dig!
  if(SPEL.fas!=='dag'){
    if(f.gomd) return;
    if(f.fas!=='fly'){
      f.fas = 'fly'; f.rutt = null;
      let bast = null, bd = 1e9;
      for(const b of byggnader){
        if(!b || b.hp<=0 || !(b.typ==='stuga'||b.typ==='langhus')) continue;
        const d = avst(f.x,f.y,(b.tx+1)*TS,(b.ty+1)*TS);
        if(d<bd){ bd = d; bast = b; }
      }
      if(bast){ const gr = granTillBygg(bast); f.mal = gr; f.gomdI = bast; }
    }
    if(f.mal){ if(foljRutt(f, dt, 92)){ f.gomd = true; f.rutt = null; svavText(f.x,f.y-20,'*göms*','#a89e88'); } }
    return;
  }
  if(f.gomd){
    f.gomd = false; f.fas = f.jobb? 'gaJobb':'ledig'; f.rutt = null; f.mal = null;
    if(f.gomdI){ const gr = granTillBygg(f.gomdI); if(gr){ f.x = gr[0]*TS+TS/2; f.y = gr[1]*TS+TS/2; } }
  }
  if(f.vantaT>0) return;
  if(!f.jobb){
    // ledig: strosa runt Långhuset
    if(!f.mal || foljRutt(f, dt, 40)){
      const lh = byggnader.find(b=>b && b.typ==='langhus');
      if(lh){ const tx = kl(lh.tx+((Math.random()*8)|0)-3, 3, MAPW-4), ty2 = kl(lh.ty+lh.def.h+((Math.random()*4)|0), 3, MAPH-4);
        if(folkPasserbar(tx,ty2,-1)){ f.mal = [tx,ty2]; f.rutt = null; } }
      f.vantaT = slump(1,3);
    }
    return;
  }
  if(f.fas==='gaJobb'){
    if(f.jobb==='mat' || f.jobb==='smalt'){
      if(!f.mal){ const gr = granTillBygg(f.hem); if(!gr){ f.vantaT = 3; return; } f.mal = gr; f.rutt = null; }
      if(foljRutt(f, dt, 62)){ f.fas = 'jobba'; f.arbT = 0; f.mal = null; f.rutt = null; }
      return;
    }
    if(!f.mal){
      const cel = narmasteObj(Math.floor(f.hem.tx+1), Math.floor(f.hem.ty+1), JOBB_OBJ[f.jobb], 30);
      if(!cel){ f.vantaT = 4; svavText(f.x,f.y-20,'Hittar ingen '+({ved:'skog',sten:'sten',malm:'malm'})[f.jobb]+'!','#d94f3c'); return; }
      f.malI = idx(cel[0],cel[1]);
      const gr = granTill(cel[0],cel[1]);
      if(!gr){ f.vantaT = 3; return; }
      f.mal = gr; f.rutt = null;
    }
    if(foljRutt(f, dt, 62)){ f.fas = 'jobba'; f.arbT = 0; f.mal = null; f.rutt = null; }
    return;
  }
  if(f.fas==='jobba'){
    f.arbT += dt;
    if(f.jobb==='mat'){
      if(f.arbT>7){ f.bar = 'mat'; f.barN = 7; f.fas = 'gaHem'; f.mal = null; f.rutt = null; f.arbT = 0; }
      return;
    }
    if(f.jobb==='smalt'){
      // hyttan: koppar + tenn → brons
      if(f.arbT>6){
        f.arbT = 0;
        if(RES.koppar>=1 && RES.tenn>=1){
          RES.koppar -= 1; RES.tenn -= 1; RES.brons += 1;
          svavText(f.x, f.y-24, '+1 brons', '#e0c088');
        }
      }
      return;
    }
    // står vi fortfarande intill rätt ruta?
    const o = JOBB_OBJ[f.jobb];
    const ratt = Array.isArray(o)? o.includes(obj[f.malI]) : obj[f.malI]===o;
    if(!ratt){ f.fas = 'gaJobb'; f.mal = null; f.malI = -1; f.arbT = 0; return; }
    if(f.arbT>1.5){
      f.arbT = 0;
      const nodTyp = obj[f.malI];
      objHP[f.malI] -= 1;
      let vinst, sort;
      if(f.jobb==='ved'){ vinst = 2; sort = 'tra'; }
      else { const md = MALMDATA[nodTyp]; vinst = md.vinst; sort = md.res; }
      if(f.bar && f.bar!==sort && f.barN>0){ RES[f.bar] += f.barN; f.barN = 0; }  // blanda inte laster
      f.bar = sort;
      f.barN += vinst;
      if(objHP[f.malI]<=0){
        if(nodTyp===O_TALL){ obj[f.malI] = O_STUBBE; aterVax[f.malI] = 75; }
        else { obj[f.malI] = O_GRUS; }
        flowSmutsig = true; miniSmutsig = true;
        f.malI = -1; f.mal = null;
        if(f.barN<6) f.fas = 'gaJobb';
      }
      if(f.barN>=6){ f.fas = 'gaHem'; f.mal = null; f.rutt = null; }
    }
    return;
  }
  if(f.fas==='gaHem'){
    if(!f.mal){
      const lager = narmastLager(f.x,f.y);
      if(!lager){ f.vantaT = 3; return; }
      const gr = granTillBygg(lager);
      if(!gr){ f.vantaT = 3; return; }
      f.mal = gr; f.rutt = null;
    }
    if(foljRutt(f, dt, 62)){
      RES[f.bar] += f.barN;
      svavText(f.x, f.y-22, '+'+f.barN, {tra:'#c9a06a',sten:'#b8b8c2',jarn:'#e8a13c',mat:'#e8c86a'}[f.bar]);
      f.barN = 0; f.bar = null; f.fas = 'gaJobb'; f.mal = null; f.rutt = null;
    }
    return;
  }
  f.fas = f.jobb? 'gaJobb' : 'ledig';
}
</script>
<script>
'use strict';
/* ===================== TROLLEN & NATTEN ===================== */
const MOBTYP = {
  vatte:  {hp:18,  fart:44, dmg:7,  bdmg:8,  atkCd:1.05,r:9,  farg:'#7fae52', morkFarg:'#5c8a3a', ogon:'#ffd97a'},
  snabb:  {hp:13,  fart:80, dmg:6,  bdmg:5,  atkCd:0.85,r:8,  farg:'#c8c84a', morkFarg:'#9a9a33', ogon:'#ffffff', jagarFolk:true},
  troll:  {hp:90,  fart:28, dmg:15, bdmg:28, atkCd:1.4, r:15, farg:'#7a8a6a', morkFarg:'#5a6a4c', ogon:'#ffb03c'},
  kastare:{hp:30,  fart:34, dmg:9,  bdmg:13, atkCd:2.3, r:11, farg:'#8a7a9a', morkFarg:'#665a74', ogon:'#d0b8ff', kastar:true},
  eld:    {hp:14,  fart:62, dmg:11, bdmg:52, atkCd:1,   r:8,  farg:'#e86a3c', morkFarg:'#b0482a', ogon:'#ffd97a', bomb:true},
  gast:   {hp:12,  fart:54, dmg:7,  bdmg:7,  atkCd:1.15,r:9,  farg:'#cfe0e8', morkFarg:'#9ab4c0', ogon:'#8fd4ff', flyg:true, jagarFolk:true},
  varulv: {hp:60,  fart:96, dmg:15, bdmg:8,  atkCd:1.0, r:11, farg:'#6a5a48', morkFarg:'#4c4034', ogon:'#ffb03c', vild:true},
  kung:   {hp:2600,fart:23, dmg:30, bdmg:70, atkCd:1.35,r:32, farg:'#8a9a8a', morkFarg:'#66766a', ogon:'#ffb03c', boss:true},
};
function gorMob(slag, x, y, elit, stor){
  const bas = MOBTYP[slag];
  let hpMult = (1 + 0.3*Math.max(0,hjaltar.length-1)) * (elit?1.6:1);
  let def = bas;
  if(elit) def = Object.assign({}, bas, {fart:bas.fart*1.15, dmg:bas.dmg+3});
  if(stor){ // mellanboss: STORTROLL
    def = Object.assign({}, def, {fart:def.fart*0.85, dmg:Math.round(def.dmg*1.6), bdmg:Math.round(def.bdmg*2), r:def.r*1.5});
    hpMult *= 4.5;
  }
  const m = { slag, def, x, y, vx:0, vy:1, hp:Math.round(bas.hp*hpMult), maxhp:Math.round(bas.hp*hpMult),
    gang:0, atkT:slump(0.3,1), kastT:slump(1,2.5), stun:0, stenad:0, elit:!!elit, stor:!!stor,
    vild:!!bas.vild, visaAtk:0, sumT:9, fas2:false };
  mobbar.push(m);
  return m;
}
function nattMobbar(){ return mobbar.filter(m=>!m.vild); }
function dodaMob(m, stridsDod){
  const i = mobbar.indexOf(m);
  if(i<0) return;
  mobbar.splice(i,1);
  if(stridsDod){
    statistik.dodade++;
    spela('dod');
    for(let k=0;k<8;k++) partiklar.push({x:m.x,y:m.y-6,vx:slump(-70,70),vy:slump(-90,-10),liv:0.5,farg:m.def.farg,st:3});
    if(m.slag==='troll' && !m.stor){ RES.sten += 3; svavText(m.x,m.y-20,'+3 sten','#b8b8c2'); }
    if(m.slag==='troll' && m.stor){ RES.sten += 8; RES.silver += 2; svavText(m.x,m.y-24,'+8 sten +2 silver!','#f6fcff', true); }
    if(m.slag==='kastare'){ RES.sten += 2; svavText(m.x,m.y-20,'+2 sten','#b8b8c2'); }
    if(m.slag==='varulv'){ RES.silver += 2; RES.mat += 4; svavText(m.x,m.y-22,'+2 silver +4 mat','#f6fcff', true); }
    if(m.slag==='kung') segra();
  } else {
    spela('smulas');
    for(let k=0;k<7;k++) partiklar.push({x:m.x,y:m.y-6,vx:slump(-50,50),vy:slump(-70,-10),liv:0.6,farg:'#8a8a90',st:3});
  }
}
function skadaFolk(f, dmg){
  f.hp -= dmg;
  if(f.hp<=0){
    const i = folket.indexOf(f);
    if(i>=0) folket.splice(i,1);
    if(f.hem) f.hem.arb = null;
    spela('dod');
    svavText(f.x, f.y-20, 'En bybo föll!', '#d94f3c', true);
    for(let k=0;k<6;k++) partiklar.push({x:f.x,y:f.y-6,vx:slump(-50,50),vy:slump(-80,-10),liv:0.5,farg:'#7a6544',st:3});
  }
}
function kastaSten(fran, mx, my, dmgB, dmgH){
  pilar.push({typ:'rock', sx:fran.x, sy:fran.y-10, tx:mx, ty:my, x:fran.x, y:fran.y-10,
    t:0, dur:Math.max(0.5, avst(fran.x,fran.y,mx,my)/180), dmgB, dmgH});
  spela('pil');
}

function uppdMob(m, dt){
  m.atkT = Math.max(0, m.atkT-dt);
  m.visaAtk = Math.max(0, m.visaAtk-dt);
  // vilddjur (varulvar): vaktar sitt revir, förstenas inte
  if(m.vild){
    if(m.stun>0){ m.stun -= dt; return; }
    let malH = null, bd = 145;
    for(const h of hjaltar){ if(h.nere>0) continue; const d = avst(m.x,m.y,h.x,h.y); if(d<bd){ bd = d; malH = h; } }
    const hemD = avst(m.x,m.y,m.hemX,m.hemY);
    if(malH && hemD < 300){
      m.gang += dt;
      const d = avst(m.x,m.y,malH.x,malH.y);
      if(d > m.def.r+12){
        const vx = (malH.x-m.x)/d*m.def.fart, vy = (malH.y-m.y)/d*m.def.fart;
        m.vx = vx; m.vy = vy;
        flyttaEnhet(m, vx*dt, vy*dt, m.def.r*0.8, true);
      } else if(m.atkT<=0){
        m.atkT = m.def.atkCd; m.visaAtk = 0.3;
        skadaHjalte(malH, m.def.dmg);
      }
    } else if(hemD > 30){
      m.gang += dt;
      const vx = (m.hemX-m.x)/hemD*m.def.fart*0.6, vy = (m.hemY-m.y)/hemD*m.def.fart*0.6;
      m.vx = vx; m.vy = vy;
      flyttaEnhet(m, vx*dt, vy*dt, m.def.r*0.8, true);
    } else m.vx = 0;
    return;
  }
  // gryningen: förstenas och smulas sönder
  if(SPEL.fas==='gryning' && !m.def.boss){
    if(m.stenad===0) spela('stenad');
    m.stenad += dt*0.9;
    if(m.stenad>2.4) dodaMob(m, false);
    return;
  }
  if(m.stun>0){ m.stun -= dt; return; }
  m.gang += dt;
  const fart = m.def.fart;
  // mål: bybor för jägare, annars hjältar nära, annars vägen mot Långhuset
  let malE = null, malAr = '';
  if(m.def.jagarFolk){
    let bd = 320;
    for(const f of folket){ if(f.gomd) continue; const d = avst(m.x,m.y,f.x,f.y); if(d<bd){ bd = d; malE = f; malAr = 'folk'; } }
  }
  if(!malE){
    let bd = m.def.flyg? 1e9 : (m.def.boss? 60 : 85);
    for(const h of hjaltar){ if(h.nere>0) continue; const d = avst(m.x,m.y,h.x,h.y); if(d<bd){ bd = d; malE = h; malAr = 'hjalte'; } }
  }
  if(m.def.flyg && !malE){
    const lh = byggnader.find(b=>b && b.typ==='langhus');
    if(lh){ malE = {x:(lh.tx+1.5)*TS, y:(lh.ty+1.5)*TS, lh:true}; malAr = 'hus'; }
  }
  // kastare: stanna och kasta sten på byggnader/hjältar inom räckhåll
  if(m.def.kastar || (m.def.boss && m.fas2)){
    m.kastT -= dt;
    if(m.kastT<=0){
      let malK = null, bd = m.def.boss? 260 : 185;
      for(const b of byggnader){
        if(!b || b.typ==='fackla' || b.hp<=0) continue;
        const cx = (b.tx+b.def.w/2)*TS, cy = (b.ty+b.def.h/2)*TS;
        const d = avst(m.x,m.y,cx,cy);
        if(d>50 && d<bd){ bd = d; malK = [cx,cy]; }
      }
      if(!malK){ for(const h of hjaltar){ if(h.nere>0) continue; const d = avst(m.x,m.y,h.x,h.y); if(d>50 && d<bd){ bd = d; malK = [h.x,h.y]; } } }
      if(malK){ kastaSten(m, malK[0], malK[1], m.def.boss? 40:12, m.def.boss? 18:9); m.kastT = m.def.boss? 3.5 : 2.6; }
      else m.kastT = 1;
    }
  }
  // Bergakungen: stampar och kallar på vättar
  if(m.def.boss){
    if(!m.fas2 && m.hp < m.maxhp*0.5){
      m.fas2 = true; spela('vral'); skaka(7,0.5);
      svavText(m.x, m.y-70, 'BERGAKUNGEN RASAR!', '#ffb03c', true);
    }
    m.sumT -= dt;
    if(m.sumT<=0){
      m.sumT = m.fas2? 7 : 9;
      spela('vral');
      for(let k=0;k<(m.fas2?3:2);k++) gorMob(m.fas2 && k===0? 'snabb':'vatte', m.x+slump(-30,30), m.y+slump(-20,20));
      svavText(m.x, m.y-60, 'Ur berget!', '#a89e88');
    }
    let naraH = null;
    for(const h of hjaltar) if(h.nere<=0 && avst(m.x,m.y,h.x,h.y)<55) naraH = h;
    if(naraH && m.atkT<=0){
      m.atkT = 3; m.visaAtk = 0.4;
      skaka(6,0.4); spela('krossa');
      for(const h of hjaltar) if(h.nere<=0 && avst(m.x,m.y,h.x,h.y)<70) skadaHjalte(h, 20);
      for(let k=0;k<10;k++) partiklar.push({x:m.x+slump(-30,30),y:m.y+slump(-6,10),vx:slump(-60,60),vy:slump(-40,-10),liv:0.5,farg:'#8a8a90',st:4});
    }
  }
  const bossFart = m.def.boss && m.fas2 ? fart*1.35 : fart;
  if(malE && malAr!=='hus'){
    // jaga levande mål
    const d = avst(m.x,m.y,malE.x,malE.y);
    const rack = m.def.r + 10;
    if(d > rack){
      const vx = (malE.x-m.x)/d*bossFart, vy = (malE.y-m.y)/d*bossFart;
      m.vx = vx; m.vy = vy;
      if(m.def.flyg){ m.x += vx*dt; m.y += vy*dt; }
      else flyttaEnhet(m, vx*dt, vy*dt, m.def.r*0.8, true);
    } else if(m.atkT<=0){
      m.atkT = m.def.atkCd; m.visaAtk = 0.3;
      if(m.def.bomb){ spranga(m); return; }
      if(malAr==='folk') skadaFolk(malE, m.def.dmg*2);
      else skadaHjalte(malE, m.def.dmg);
    }
    return;
  }
  // följ flödet mot Långhuset
  const tx = Math.floor(m.x/TS), ty2 = Math.floor(m.y/TS);
  const steg = inne(tx,ty2)? flodeSteg(tx,ty2) : null;
  let rx = 0, ry = 0, malB = null;
  if(steg){
    const b = bygget(steg[0], steg[1]);
    if(b && b.def.fast!==false) malB = b;
    rx = steg[0]*TS+TS/2 - m.x; ry = steg[1]*TS+TS/2 - m.y;
  } else {
    // instängd eller vilse: gå rakt mot Långhuset och krossa det som är i vägen
    const lh = byggnader.find(bb=>bb && bb.typ==='langhus');
    if(lh){ rx = (lh.tx+1.5)*TS - m.x; ry = (lh.ty+1.5)*TS - m.y; }
    const ftx = Math.floor((m.x+Math.sign(rx)*TS)/TS), fty = Math.floor((m.y+Math.sign(ry)*TS)/TS);
    const fb = bygget(ftx,fty);
    if(fb && fb.def.fast!==false) malB = fb;
    else if(inne(ftx,fty) && obj[idx(ftx,fty)]===O_TALL && !m.def.flyg){
      // trollen bryter sig igenom skogen
      if(m.atkT<=0){ m.atkT = m.def.atkCd; m.visaAtk = 0.35;
        objHP[idx(ftx,fty)] -= 2;
        if(objHP[idx(ftx,fty)]<=0){ obj[idx(ftx,fty)] = O_STUBBE; aterVax[idx(ftx,fty)] = 75; flowSmutsig = true; } }
      return;
    }
  }
  const dl = Math.hypot(rx,ry)||1;
  if(malB){
    const cx = (malB.tx+malB.def.w/2)*TS, cy = (malB.ty+malB.def.h/2)*TS;
    const nara = avst(m.x,m.y,cx,cy) < (Math.max(malB.def.w,malB.def.h)/2)*TS + m.def.r + 8;
    if(nara){
      if(m.def.bomb){ spranga(m); return; }
      if(m.atkT<=0){
        m.atkT = m.def.atkCd; m.visaAtk = 0.35;
        skadaBygg(malB, m.def.bdmg);
        malB.tid = 0;
        if(m.slag==='troll'||m.slag==='kung'||Math.random()<0.25) spela('krossa');
        partiklar.push({x:cx+slump(-10,10),y:cy+slump(-8,8),vx:slump(-40,40),vy:slump(-60,-10),liv:0.4,farg:'#7a5c38',st:3});
      }
      return;
    }
  }
  m.vx = rx/dl*bossFart; m.vy = ry/dl*bossFart;
  if(m.def.flyg){ m.x += rx/dl*bossFart*dt; m.y += ry/dl*bossFart*dt; }
  else flyttaEnhet(m, rx/dl*bossFart*dt, ry/dl*bossFart*dt, m.def.r*0.8, true);
  // lite separation så de inte står i varandra
  for(const q of mobbar){
    if(q===m) continue;
    const d = avst(m.x,m.y,q.x,q.y);
    if(d>0.1 && d < m.def.r+q.def.r){ m.x += (m.x-q.x)/d*14*dt; m.y += (m.y-q.y)/d*14*dt; }
  }
}
function spranga(m){
  spela('boom'); skaka(5,0.3);
  for(let k=0;k<16;k++) partiklar.push({x:m.x,y:m.y-6,vx:slump(-110,110),vy:slump(-130,-10),liv:0.6,farg:k%2?'#ff8c28':'#ffd97a',st:4});
  for(const b of byggnader){
    if(!b) continue;
    const cx = (b.tx+b.def.w/2)*TS, cy = (b.ty+b.def.h/2)*TS;
    if(avst(m.x,m.y,cx,cy)<52) skadaBygg(b, m.def.bdmg);
  }
  for(const h of hjaltar) if(h.nere<=0 && avst(m.x,m.y,h.x,h.y)<48) skadaHjalte(h, 14);
  for(const f of folket) if(!f.gomd && avst(m.x,m.y,f.x,f.y)<48) skadaFolk(f, 20);
  dodaMob(m, false);
  statistik.dodade++;
}

/* ---- projektiler ---- */
function uppdPilar(dt){
  for(const p of [...pilar]){
    if(p.typ==='rock'){
      p.t += dt/p.dur;
      if(p.t>=1){
        pilar.splice(pilar.indexOf(p),1);
        spela('sten');
        for(let k=0;k<6;k++) partiklar.push({x:p.tx,y:p.ty,vx:slump(-50,50),vy:slump(-60,-10),liv:0.4,farg:'#8b8b93',st:3});
        const b = bygget(Math.floor(p.tx/TS), Math.floor(p.ty/TS));
        if(b) skadaBygg(b, p.dmgB);
        for(const h of hjaltar) if(h.nere<=0 && avst(p.tx,p.ty,h.x,h.y)<20) skadaHjalte(h, p.dmgH);
        for(const f of folket) if(!f.gomd && avst(p.tx,p.ty,f.x,f.y)<18) skadaFolk(f, p.dmgH);
        continue;
      }
      p.x = mix(p.sx, p.tx, p.t);
      p.y = mix(p.sy, p.ty, p.t);
      p.h = Math.sin(p.t*Math.PI)*46;   // kastbågen ritas som höjd i iso
      continue;
    }
    p.x += p.vx*dt; p.y += p.vy*dt; p.liv -= dt;
    let traff = false;
    for(const m of mobbar){
      if(m.stenad>0) continue;
      if(avst(p.x,p.y,m.x,m.y-m.def.r) < m.def.r+5 || avst(p.x,p.y,m.x,m.y) < m.def.r+5){
        skadaMob(m, p.dmg, p.fran||null); traff = true; break;
      }
    }
    if(traff || p.liv<=0 || p.x<0||p.y<0||p.x>PXW||p.y>PXH) pilar.splice(pilar.indexOf(p),1);
  }
}

/* ---- byggnader: torn skjuter, portar öppnas, åkrar växer ---- */
function uppdByggnader(dt){
  for(const b of byggnader){
    if(!b) continue;
    b.tid += dt; b.ny = Math.max(0, b.ny-dt);
    if(b.typ==='torn'){
      b.skytT -= dt;
      if(b.skytT<=0){
        const cx = (b.tx+0.5)*TS, cy = b.ty*TS-14;
        let mal = null, bd = 175;
        for(const m of mobbar){ if(m.stenad>0) continue; const d = avst(cx,cy,m.x,m.y); if(d<bd){ bd = d; mal = m; } }
        if(mal){
          b.skytT = 1.1;
          const v = Math.atan2(mal.y-14-cy, mal.x-cx);
          pilar.push({typ:'pil', x:cx, y:cy, vx:Math.cos(v)*300, vy:Math.sin(v)*300, dmg:8*(1+0.5*SMIDE.pilar), liv:0.8});
          spela('pil');
        } else b.skytT = 0.25;
      }
    }
    if(b.typ==='port'){
      let nara = false;
      const cx = (b.tx+0.5)*TS, cy = (b.ty+0.5)*TS;
      for(const h of hjaltar) if(avst(h.x,h.y,cx,cy)<34) nara = true;
      for(const f of folket) if(!f.gomd && avst(f.x,f.y,cx,cy)<30) nara = true;
      b.oppen = kl(b.oppen + (nara? dt*5 : -dt*5), 0, 1);
    }
  }
}

/* ---- dygnet ---- */
function kantPos(kant){
  if(kant==='N') return [slump(5,MAPW-5)*TS, 3.2*TS];
  if(kant==='S') return [slump(5,MAPW-5)*TS, (MAPH-3.2)*TS];
  if(kant==='V') return [3.2*TS, slump(5,MAPH-5)*TS];
  return [(MAPW-3.2)*TS, slump(5,MAPH-5)*TS];
}
function planeraNatt(n){
  const spelare = Math.max(1, hjaltar.length);
  const blod = n%4===0 && n<20;                    // blodnatt var 4:e natt
  const skala = (n>20 ? Math.pow(1.18, n-20) : 1) * (blod? 1.4 : 1);
  const antal = Math.round((6 + n*2.6) * (0.7 + 0.3*spelare) * skala);
  const sorter = [];
  for(let i=0;i<antal;i++){
    let s = 'vatte';
    const r = Math.random();
    if(n>=2 && r<0.24) s = 'snabb';
    if(n>=3 && r>=0.24 && r<0.36) s = 'kastare';
    if(n>=5 && r>=0.36 && r<0.46) s = 'eld';
    if(n>=6 && r>=0.46 && r<0.56) s = 'gast';
    sorter.push(s);
  }
  const nTroll = n>=2 ? Math.floor(n/2) : 0;
  for(let i=0;i<Math.round(nTroll*skala);i++) sorter.push('troll');
  // kanter — fler håll ju längre in i spelet
  const alla = ['N','S','V','O'];
  const nKant = n<3?1 : n<6?2 : n<10?3 : 4;
  const kanter = [];
  while(kanter.length<nKant){
    const k = valfri(alla);
    if(!kanter.includes(k)) kanter.push(k);
  }
  // kö i tre anstormningar
  const ko = [];
  sorter.forEach((s,i)=>{
    const våg = i%3;
    ko.push({ t: 2 + våg*26 + slump(0,7), slag:s, kant: kanter[i%kanter.length],
      elit: n>=5 && Math.random() < 0.08+0.02*n });
  });
  // mellanbossar: STORTROLL natt 5 & 10, TVÅ natt 15 — Bergakungen natt 20
  if(n===5 || n===10) ko.push({ t: 20, slag:'troll', kant: kanter[0], stor:true });
  if(n===15){ ko.push({ t: 20, slag:'troll', kant: kanter[0], stor:true });
    ko.push({ t: 24, slag:'troll', kant: kanter[kanter.length-1], stor:true }); }
  if(n===20) ko.push({ t: 12, slag:'kung', kant: kanter[0] });
  if(n>20 && n%5===0) ko.push({ t: 18, slag:'troll', kant: kanter[0], stor:true });
  ko.sort((a,b)=>a.t-b.t);
  return { tid:0, ko, kanter, blod };
}
function startNatt(){
  SPEL.fas = 'natt'; SPEL.klocka = 0;
  if(!SPEL.nattKlar) SPEL.natt = planeraNatt(SPEL.dag);
  SPEL.nattKlar = false;
  sattLat(SPEL.dag===20? 'boss' : 'natt');
  spela('lur');
  const m1 = skarmMitt(120), m2 = skarmMitt(90);
  if(SPEL.dag===20){ spela('vral'); svavText(m1[0], m1[1], 'BERGAKUNGEN KOMMER!', '#ffb03c', true); }
  else if(SPEL.natt.blod){ spela('vral'); svavText(m1[0], m1[1], 'BLODNATT — dubbel styrka!', '#d94f3c', true); }
  svavText(m2[0], m2[1], '— NATT '+SPEL.dag+' —', '#8fd4ff', true);
}
function startGryning(){
  SPEL.fas = 'gryning'; SPEL.klocka = 0;
  spela('tupp');
  const gm = skarmMitt(90);
  svavText(gm[0], gm[1], 'GRYNING — trollen förstenas!', '#ffd97a', true);
}
function startDag(n){
  SPEL.dag = n; SPEL.fas = 'dag';
  SPEL.dagLangd = n===1? 140 : 100;
  SPEL.tidKvar = SPEL.dagLangd;
  SPEL.varnat = false;
  sattLat('dag');
  if(n>1){ const dm = skarmMitt(90); svavText(dm[0], dm[1], '— DAG '+n+' —', '#ffd97a', true); }
}
function uppdDygn(dt){
  if(SPEL.fas==='dag'){
    SPEL.tidKvar -= dt;
    if(SPEL.tidKvar<10 && !SPEL.varnat){
      SPEL.varnat = true;
      SPEL.natt = planeraNatt(SPEL.dag);   // så minimapen kan varna för anfallskanterna
      SPEL.nattKlar = true;
      spela('varning');
    }
    if(SPEL.tidKvar<=0) startNatt();
  } else if(SPEL.fas==='natt'){
    SPEL.natt.tid += dt;
    const ko = SPEL.natt.ko;
    while(ko.length && ko[0].t <= SPEL.natt.tid){
      const post = ko.shift();
      const [sx,sy] = kantPos(post.kant);
      const m = gorMob(post.slag, sx, sy, post.elit, post.stor);
      if(post.stor){ spela('vral'); const sm = skarmMitt(120); svavText(sm[0], sm[1], 'ETT STORTROLL!', '#ffb03c', true); }
    }
    if(!ko.length && nattMobbar().length===0) startGryning();
  } else if(SPEL.fas==='gryning'){
    SPEL.klocka += dt;
    if(SPEL.klocka>5 && nattMobbar().length===0) startDag(SPEL.dag+1);
  }
}

/* ---- start, nederlag, seger ---- */
function startSpel(){
  nyVarld((Math.random()*1e9)|0);
  RES = { tra:30, sten:8, mat:12, jarn:0, koppar:0, tenn:0, brons:0, silver:0, guld:0 };
  folket = []; mobbar = []; pilar = []; partiklar = []; texter = [];
  // vilddjur vaktar silver, guld och skattkistor
  for(const [vtx,vty] of vildPlatser){
    const m = gorMob('varulv', vtx*TS+slump(-20,20), vty*TS+40+slump(-10,10));
    m.hemX = m.x; m.hemY = m.y;
  }
  statistik = { dodade:0, byggt:0, folkFott:0 };
  SPEL.lage = 'spel'; SPEL.paus = false; SPEL.seger = false; SPEL.segerT = 0;
  SPEL.folkT = 6; SPEL.jobbT = 0; SPEL.flowT = 0; SPEL.natt = {};
  hjaltar.forEach((h,i)=>{
    const nyH = gorHjalte(h.ci, h.pad, i);
    hjaltar[i] = nyH;
  });
  for(let i=0;i<3;i++) foddFolk();
  statistik.folkFott = 0;
  startDag(1);
  uppdKamera(0, true);
  spela('tupp');
}
function byNederlag(){
  SPEL.lage = 'slut'; SPEL.slutT = 2.5;
  sattLat('slut');
  spela('vral'); skaka(9,0.8);
}
function segra(){
  SPEL.seger = true; SPEL.segerT = 0;
  sattLat('seger');
  spela('fanfar'); skaka(4,0.4);
  const lh = byggnader.find(b=>b && b.typ==='langhus');
  const bx = lh? (lh.tx+1.5)*TS : PXW/2, by = lh? (lh.ty+1.5)*TS : PXH/2;
  for(let k=0;k<60;k++) partiklar.push({x:bx+slump(-260,260), y:by+slump(-260,260), z:slump(60,180),
    vx:slump(-20,20), vy:slump(-10,30), liv:slump(1.2,2.6), farg:valfri(['#ffd97a','#8fd4ff','#e893b8','#8fd45a']), st:4});
}

/* ---- huvuduppdateringen i spelet ---- */
function uppdSpel(dt){
  if(SPEL.lage==='slut'){
    SPEL.slutT -= dt;
    for(const p of [...partiklar]){ p.x += p.vx*dt; p.z = (p.z||0)-p.vy*dt; p.liv -= dt; if(p.liv<=0) partiklar.splice(partiklar.indexOf(p),1); }
    if(SPEL.slutT<=0){
      for(const h of hjaltar) if(lasInput(h.pad).aT){ startSpel(); return; }
    }
    return;
  }
  if(SPEL.paus) return;
  tid += dt;
  skakT = Math.max(0, skakT-dt); if(skakT<=0) skakA = 0;
  if(SPEL.seger) SPEL.segerT += dt;
  for(const h of hjaltar) uppdHjalte(h, dt);
  SPEL.jobbT -= dt;
  if(SPEL.jobbT<=0){ SPEL.jobbT = 1; fordelaJobb(); }
  for(const f of [...folket]) uppdFolk(f, dt);
  for(const m of [...mobbar]) uppdMob(m, dt);
  uppdPilar(dt);
  uppdByggnader(dt);
  // partiklar & texter
  for(const p of [...partiklar]){
    p.x += p.vx*dt;
    p.z = (p.z||0) - p.vy*dt;   // negativ vy = uppåt; ritas som höjd över marken
    if(!p.rok) p.vy += 140*dt;
    p.liv -= dt;
    if(p.liv<=0) partiklar.splice(partiklar.indexOf(p),1);
  }
  for(const t of [...texter]){ t.t += dt; if(t.t>1.6) texter.splice(texter.indexOf(t),1); }
  // återväxt
  for(const nyckel in aterVax){
    aterVax[nyckel] -= dt;
    if(aterVax[nyckel]<=0){
      const i2 = +nyckel;
      if(obj[i2]===O_STUBBE && byggKarta[i2]<0){ obj[i2] = O_TALL; objHP[i2] = 3; flowSmutsig = true; miniSmutsig = true; }
      else if(obj[i2]===O_BAR) objHP[i2] = 1;
      delete aterVax[nyckel];
    }
  }
  // nya bybor om det finns mat & plats
  SPEL.folkT -= dt;
  if(SPEL.folkT<=0){
    SPEL.folkT = 12;
    if(folket.length < folkTak() && RES.mat>=8 && SPEL.fas==='dag'){ RES.mat -= 8; foddFolk(); }
  }
  uppdDygn(dt);
  // flödesfältet räknas om ibland
  SPEL.flowT -= dt;
  if(flowSmutsig && SPEL.flowT<=0){ raknaFlode(); flowSmutsig = false; SPEL.flowT = 0.4; }
  uppdKamera(dt);
}

<script>
'use strict';
/* ===================== NÄT, LOBBY & UPPSTART =====================
   En enhet är värd (stora skärmen). Mobiler ansluter via PeerJS och
   blir handkontroller. Snabba tryck latchas hos värden så de aldrig
   faller mellan två bildrutor. */

if(URLQ.get('join')) SIDLAGE = 'mobil';
else if(HARPEER && ARPEK && Math.min(window.innerWidth, window.innerHeight) < 620) SIDLAGE = 'val';

const LANK = { roll:'ingen', peer:null, pads:{}, kod:'', oppen:false, nastaIdx:0, senastSkick:0 };
const PUBLIK_URL = 'https://8bitcat.github.io/trollnatt/';
// STUN + TURN-relä (behövs bakom VPN/client isolation — infrastruktur, inte spelkod)
const ISKONF = { config:{ iceServers:[
  { urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302'] },
  { urls:'turn:openrelay.metered.ca:80', username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:443?transport=tcp', username:'openrelayproject', credential:'openrelayproject' }
]}};
function gorKod(){
  const A = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s = '';
  for(let i=0;i<4;i++) s += A[(Math.random()*A.length)|0];
  return s;
}
function padIdn(){ return Object.keys(LANK.pads).filter(id=>LANK.pads[id].vid); }

function startVard(){
  if(!HARPEER || LANK.roll==='vard') return;
  LANK.roll = 'vard';
  let forsok = 0;
  const forsoka = ()=>{
    LANK.kod = gorKod();
    const peer = new Peer('trollnatt-'+LANK.kod, ISKONF);
    LANK.peer = peer;
    peer.on('open', ()=>{ LANK.oppen = true; uppdateraQR(); });
    peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
    peer.on('error', fel=>{
      if(fel && fel.type==='unavailable-id' && forsok++ < 5){ try{ peer.destroy(); }catch(e){} forsoka(); }
    });
    peer.on('connection', kanal=>{
      kanal.on('open', ()=>{
        // återanvänd ett dött id om mobilen laddade om
        const upptagna = [...vantar.map(j=>j.pad), ...hjaltar.map(h=>h.pad)];
        let id = upptagna.find(p=>p && p[0]==='n' && (!LANK.pads[p] || !LANK.pads[p].vid));
        if(!id) id = 'n'+(LANK.nastaIdx++);
        LANK.pads[id] = { kanal, vid:true, st:{x:0,y:0,a:false,b:false,c:false} };
        kanal.on('data', d=>{
          if(!d || d.k!=='in' || !LANK.pads[id]) return;
          const st = LANK.pads[id].st;
          const nx = +d.x||0, ny = +d.y||0, na = !!d.a, nb = !!d.b, nc = !!d.c;
          if(na && !st.a) st.aT = true;      // latcha varje nedtryck
          if(nb && !st.b) st.bT = true;
          if(nc && !st.c) st.cT = true;
          if(nx!==0 && st.x===0) st.xT = nx>0?1:-1;
          st.x = nx; st.y = ny; st.a = na; st.b = nb; st.c = nc;
        });
        const tappa = ()=>{ if(LANK.pads[id] && LANK.pads[id].kanal===kanal){
          LANK.pads[id].vid = false; LANK.pads[id].st = {x:0,y:0,a:false,b:false,c:false}; } };
        kanal.on('close', tappa); kanal.on('error', tappa);
      });
    });
  };
  forsoka();
}
function skickaTill(id, m){
  const p = LANK.pads[id];
  if(p && p.vid){ try{ p.kanal.send(m); }catch(e){} }
}
function skickaStatus(){
  if(LANK.roll!=='vard') return;
  const nu = performance.now()/1000;
  if(nu - LANK.senastSkick < 0.3) return;
  LANK.senastSkick = nu;
  for(const id of padIdn()){
    let m = { k:'st', lage:'lobby' };
    const jr = vantar.find(j=>j.pad===id);
    if(jr){
      const ch = HJALTAR_DEF[jr.ci];
      m = { k:'st', lage:'valj', namn:ch.namn, farg:ch.farg, redo:jr.redo, ipl:SPEL.lage!=='lobby' };
    } else {
      const h = hjaltar.find(p=>p.pad===id);
      if(h) m = { k:'st', lage:'spel', namn:h.ch.namn, farg:h.ch.farg,
        hp:Math.max(0,Math.round(h.hp)), maxhp:h.maxhp, dag:SPEL.dag, fas:SPEL.fas,
        nere:h.nere>0, kraft:h.kraftCd<=0, bygg:h.byggPa, slut:SPEL.lage==='slut', seger:SPEL.seger };
    }
    skickaTill(id, m);
  }
}
const qrSkylt = document.getElementById('qrSkylt');
function lankUrl(){
  const bas = location.hostname==='8bitcat.github.io' ? location.origin+location.pathname : PUBLIK_URL;
  return bas + '?join=' + LANK.kod;
}
function uppdateraQR(){
  if(!LANK.oppen) return;
  qrSkylt.innerHTML = '<img width="150" height="150" alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=100c14&bgcolor=efe6d0&data='+encodeURIComponent(lankUrl())+'">'
    + '<div style="font-size:12px;margin-top:5px">Skanna med mobilkameran</div>'
    + '<div class="kod">'+LANK.kod.toUpperCase()+'</div>';
}
function qrSync(){
  qrSkylt.style.display = (LANK.oppen && SPEL.lage==='lobby' && SIDLAGE!=='mobil') ? 'block' : 'none';
}

/* ---- mobilsidan ---- */
function kopplaSpak(st, sand){
  const yta = document.getElementById('spakYta');
  const ring = document.getElementById('spakRing'), puck = document.getElementById('spakPuck');
  const tips = document.getElementById('spakTips');
  let pid = null, ox = 0, oy = 0;
  const satt = (el,x,y,s)=>{ el.style.left = (x-s/2)+'px'; el.style.top = (y-s/2)+'px'; };
  yta.addEventListener('pointerdown', e=>{
    if(pid!==null) return;
    pid = e.pointerId;
    try{ yta.setPointerCapture(pid); }catch(err){}
    const r = yta.getBoundingClientRect();
    ox = e.clientX-r.left; oy = e.clientY-r.top;
    tips.style.display = 'none';
    ring.style.display = 'block'; puck.style.display = 'block';
    satt(ring,ox,oy,128); satt(puck,ox,oy,60);
  });
  yta.addEventListener('pointermove', e=>{
    if(e.pointerId!==pid) return;
    const r = yta.getBoundingClientRect();
    let dx = e.clientX-r.left-ox, dy = e.clientY-r.top-oy;
    const d = Math.hypot(dx,dy), max = 58;
    if(d>max){ dx = dx/d*max; dy = dy/d*max; }
    satt(puck, ox+dx, oy+dy, 60);
    const gx = st.x;
    st.x = Math.abs(dx/max)<0.24? 0 : dx/max;
    st.y = Math.abs(dy/max)<0.24? 0 : dy/max;
    if(st.x!==0 && gx===0) st.xT = st.x>0?1:-1;
    sand();
  });
  const slapp = e=>{
    if(e.pointerId!==pid) return;
    pid = null; st.x = 0; st.y = 0;
    ring.style.display = 'none'; puck.style.display = 'none';
    sand();
  };
  yta.addEventListener('pointerup', slapp);
  yta.addEventListener('pointercancel', slapp);
  const knyt = (elId, nyckel)=>{
    const el = document.getElementById(elId);
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); st[nyckel] = true; st[nyckel+'T'] = true; el.classList.add('tryckt'); sand(); vackLjud(); });
    const av = ()=>{ st[nyckel] = false; el.classList.remove('tryckt'); sand(); };
    el.addEventListener('pointerup', av);
    el.addEventListener('pointercancel', av);
    el.addEventListener('pointerleave', av);
  };
  knyt('knA','a'); knyt('knB','b'); knyt('knC','c');
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());
}
// lokal pekkontroll ovanpå värdskärmen (spela solo på surfplatta)
let LOKALPAD = false;
function aktiveraLokalPad(){
  if(LOKALPAD || PADSTART) return;
  LOKALPAD = true;
  const padUI = document.getElementById('padUI');
  padUI.classList.add('pahost');
  padUI.style.display = 'flex';
  kopplaSpak(PEKPAD, ()=>{});
}
let PADSTART = false;   // egen flagga — INTE SIDLAGE-koll (vid ?join= är läget redan 'mobil')
function anslutLank(kod){
  if(PADSTART) return;
  PADSTART = true;
  SIDLAGE = 'mobil';
  document.getElementById('stage').style.display = 'none';
  document.getElementById('valUI').style.display = 'none';
  const padUI = document.getElementById('padUI');
  padUI.style.display = 'flex';
  const info = document.getElementById('padInfo');
  const st = {x:0,y:0,a:false,b:false,c:false};
  let kanal = null, koppl = false;
  const sand = ()=>{
    if(koppl){ try{ kanal.send({k:'in', x:Math.round(st.x*100)/100, y:Math.round(st.y*100)/100, a:st.a, b:st.b, c:st.c}); }catch(e){} }
  };
  setInterval(sand, 100);
  info.textContent = 'Ansluter till by '+kod.toUpperCase()+'…';
  const peer = new Peer(ISKONF);
  let forsok = 0;
  peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
  const koppla = ()=>{
    forsok++;
    kanal = peer.connect('trollnatt-'+kod.toLowerCase(), { reliable:true });
    kanal.on('open', ()=>{ koppl = true; forsok = 0;
      info.innerHTML = '<b style="color:#a8e08a">Ansluten!</b> Tryck YXA för att kliva in i byn.'; });
    kanal.on('data', d=>{
      if(!d || d.k!=='st') return;
      if(d.lage==='lobby') info.innerHTML = 'Ansluten till <b>'+kod.toUpperCase()+'</b> — tryck YXA för att gå med!';
      else if(d.lage==='valj')
        info.innerHTML = '<span style="color:'+d.farg+'">&#9632; '+d.namn+'</span>'
          + (d.ipl ? ' — YXA = hoppa in i byn!'
             : (d.redo ? ' — <b style="color:#a8e08a">REDO!</b> (BYGG = ångra)' : ' — styr &#8592;&#8594; och välj, YXA = redo'));
      else if(d.slut) info.innerHTML = '<b style="color:#ff7a6a">Byn föll…</b> Tryck YXA för nytt försök!';
      else {
        const block = 10, fyllda = d.maxhp? Math.max(0, Math.round(d.hp/d.maxhp*block)) : 0;
        const stapel = '<span style="color:#a8e08a">'+'&#9608;'.repeat(fyllda)+'</span><span style="color:#3a2f4c">'+'&#9608;'.repeat(block-fyllda)+'</span>';
        info.innerHTML = '<span style="color:'+d.farg+'">&#9632; '+d.namn+'</span> '+stapel+' '
          + (d.nere ? '<b style="color:#ff7a6a">NERE! En vän kan hjälpa dig upp.</b>'
             : d.seger ? '<b style="color:#ffd97a">SEGER! Bygg vidare!</b>'
             : d.bygg ? '<b style="color:#a8e08a">BYGGLÄGE</b> — BYGG bläddrar, YXA placerar'
             : (d.fas==='natt' ? '<b style="color:#8fd4ff">NATT '+d.dag+'</b> — försvara byn!'
                : 'Dag '+d.dag+(d.kraft? ' — <b style="color:#8fd4ff">KRAFT redo!</b>':'')));
      }
    });
    kanal.on('close', ()=>{
      if(koppl){ koppl = false; info.innerHTML = '<b style="color:#ff7a6a">Tappade kontakten.</b> Försöker igen…'; setTimeout(koppla, 2000); }
    });
    kanal.on('error', ()=>{});
  };
  const omigen = ()=>{
    if(koppl) return;
    if(forsok < 6){
      info.innerHTML = 'Hittar inte byn <b>'+kod.toUpperCase()+'</b> — försöker igen ('+forsok+'/5)…';
      setTimeout(koppla, 2500);
    } else {
      info.innerHTML = '<b style="color:#ff7a6a">Kunde inte ansluta.</b> Kolla koden och att spelet är igång på stora skärmen — ladda sedan om.';
    }
  };
  peer.on('open', koppla);
  peer.on('error', fel=>{
    if(fel && fel.type==='peer-unavailable') omigen();
    else if(!koppl && forsok>0 && fel && fel.type!=='disconnected') omigen();
  });
  kopplaSpak(st, sand);
}

/* ---- lobby ---- */
function nyVantare(pad){
  if(vantar.some(j=>j.pad===pad) || hjaltar.some(h=>h.pad===pad)) return null;
  const jr = { pad, ci: vantar.length%HJALTAR_DEF.length, redo:false, px:0, farsk:true };
  vantar.push(jr); spela('valj');
  return jr;
}
function skannaNyaPads(){
  for(const id of padIdn()) nyVantare(id);
  if(TLATCH.a && !vantar.some(j=>j.pad==='kb') && !hjaltar.some(h=>h.pad==='kb')){
    TLATCH.a = false; nyVantare('kb');
  }
  if(LOKALPAD && PEKPAD.aT && !vantar.some(j=>j.pad==='lokal') && !hjaltar.some(h=>h.pad==='lokal')){
    PEKPAD.aT = false; nyVantare('lokal');
  }
  for(const gp of gpCache) if(gp.aT && !vantar.some(j=>j.pad===gp.id) && !hjaltar.some(h=>h.pad===gp.id)) nyVantare(gp.id);
  vantar = vantar.filter(j=> j.pad[0]!=='n' || (LANK.pads[j.pad] && LANK.pads[j.pad].vid));
}
function uppdVantare(jr, ipl){
  const inp = lasInput(jr.pad);
  let steg = 0;
  if(inp.xT) steg = inp.xT;
  else { if(inp.x>0.5 && jr.px<=0.5) steg = 1; if(inp.x<-0.5 && jr.px>=-0.5) steg = -1; }
  jr.px = inp.x;
  if(!jr.redo && steg){ jr.ci = (jr.ci+steg+HJALTAR_DEF.length)%HJALTAR_DEF.length; spela('valj'); }
  if(inp.aT){
    if(ipl){
      const h = gorHjalte(jr.ci, jr.pad, hjaltar.length);
      hjaltar.push(h);
      vantar = vantar.filter(q=>q!==jr);
      svavText(h.x, h.y-34, h.ch.namn+' KLIVER IN!', h.ch.farg, true);
      spela('redo');
      return;
    }
    jr.redo = !jr.redo; spela('redo');
  }
  if(inp.bT && !ipl) jr.redo = false;
}
function uppdLobby(dt){
  tid += dt;
  sattLat('lobby');
  skannaNyaPads();
  for(const jr of vantar){
    if(jr.farsk){ jr.farsk = false; continue; }
    uppdVantare(jr, false);
  }
  if(vantar.length>0 && vantar.every(j=>j.redo)){
    if(SPEL.startT<0) SPEL.startT = 3.2;
    SPEL.startT -= dt;
    if(SPEL.startT<=0){
      hjaltar = vantar.map((j,i)=>gorHjalte(j.ci, j.pad, i));
      vantar = []; SPEL.startT = -1;
      spela('fanfar');
      startSpel();
    }
  } else SPEL.startT = -1;
}

/* ---- bildrutan ---- */
let forraT = performance.now();
function bildruta(nu){
  const dt = Math.min(0.05, (nu-forraT)/1000);
  forraT = nu;
  // en enskild trasig bildruta får aldrig döda spelet
  try{
    gpCache = pollGamepads();
    if(SPEL.lage==='lobby') uppdLobby(dt);
    else {
      uppdSpel(dt);
      // nya spelare kan hoppa in mitt i spelet
      skannaNyaPads();
      for(const jr of vantar){ if(jr.farsk){ jr.farsk = false; continue; } uppdVantare(jr, true); }
    }
    musikPuls();
    skickaStatus();
  }catch(e){ console.error('uppd:', e); }
  try{ ritaAllt(); qrSync(); }catch(e){ console.error('rita:', e); }
  requestAnimationFrame(bildruta);
}

/* ---- felsökningskrokar (används av våra Playwright-tester) ---- */
window.TN = {
  status: ()=>({ lage:SPEL.lage, dag:SPEL.dag, fas:SPEL.fas, tidKvar:Math.round(SPEL.tidKvar||0),
    res:{...RES}, smide:{...SMIDE}, vantar:vantar.length,
    hjaltar:hjaltar.map(h=>({id:h.ch.id, x:Math.round(h.x), y:Math.round(h.y), hp:Math.round(h.hp), nere:h.nere>0, byggPa:h.byggPa})),
    folk:folket.length, mobbar:mobbar.length, byggnader:byggnader.filter(b=>b).length,
    ko:SPEL.natt && SPEL.natt.ko? SPEL.natt.ko.length : 0 }),
  ge: o=>Object.assign(RES, o),
  start: cis=>{ hjaltar = (cis||[0]).map((ci,i)=>gorHjalte(ci,'dbg'+i,i)); vantar = []; startSpel(); },
  natt: ()=>{ SPEL.tidKvar = 0.01; },
  gryning: ()=>{ if(SPEL.natt.ko) SPEL.natt.ko = []; startGryning(); },
  dag: ()=>{ mobbar = []; if(SPEL.natt.ko) SPEL.natt.ko = []; startDag(SPEL.dag+1); },
  sattDag: n=>{ SPEL.dag = n; },
  bygg: (typ,tx,ty)=>placeraBygg(typ,tx,ty,true),
  spawn: (slag,n)=>{ for(let i=0;i<(n||1);i++){ const [x,y] = kantPos('N'); gorMob(slag||'vatte', x, y); } },
  boss: ()=>gorMob('kung', PXW/2, 4*TS),
  doda: ()=>{ for(const m of [...mobbar]) dodaMob(m, true); },
  folkNu: n=>{ for(let i=0;i<(n||1);i++) foddFolk(); },
  folkInfo: ()=>folket.map(f=>({x:Math.round(f.x), y:Math.round(f.y), jobb:f.jobb, fas:f.fas,
    barN:f.barN, mal:f.mal, rutt:f.rutt? f.rutt.length : null, vantaT:Math.round(f.vantaT*10)/10, gomd:f.gomd})),
  lank: LANK, spel: SPEL,
  hitta: typ=>{ let bast = null, bd = 1e9;
    for(let ty2=0;ty2<MAPH;ty2++) for(let tx=0;tx<MAPW;tx++){
      if(obj[idx(tx,ty2)]!==typ) continue;
      const d = Math.abs(tx-48)+Math.abs(ty2-32);
      if(d<bd){ bd = d; bast = [tx,ty2]; } }
    return bast; },
  flytta: (tx,ty)=>{ if(hjaltar[0]){ hjaltar[0].x = tx*TS+12; hjaltar[0].y = ty*TS+12; uppdKamera(0,true); } },
  tryckA: ()=>{ if(hjaltar[0]) utforHandling(hjaltar[0]); },
};

/* ---- uppstart ---- */
if(SIDLAGE==='mobil'){
  anslutLank(URLQ.get('join'));
} else if(SIDLAGE==='val'){
  const valUI = document.getElementById('valUI');
  valUI.style.display = 'flex';
  // pointerup + click med dubbeltrycksskydd — iOS kan svälja rena click-händelser
  const peka = (el, fn)=>{
    let sen = 0;
    const h = e=>{ const nu = performance.now(); if(nu-sen<400) return; sen = nu; fn(e); };
    el.addEventListener('pointerup', h);
    el.addEventListener('click', h);
  };
  peka(document.getElementById('valAnslut'), ()=>{
    document.getElementById('valAnslut').style.display = 'none';
    document.getElementById('kodDel').style.display = 'flex';
    document.getElementById('kodFalt').focus();
  });
  const kor = ()=>{
    const kod = document.getElementById('kodFalt').value.trim();
    if(kod.length===4) anslutLank(kod);
  };
  peka(document.getElementById('kodGo'), kor);
  document.getElementById('kodFalt').addEventListener('keydown', e=>{ if(e.key==='Enter') kor(); });
  let vardStartad = false;
  peka(document.getElementById('valHost'), ()=>{
    if(vardStartad) return; vardStartad = true;
    valUI.style.display = 'none';
    startVard();
    if(ARPEK) aktiveraLokalPad();
    forraT = performance.now();
    requestAnimationFrame(bildruta);
  });
} else {
  startVard();
  if(ARPEK && Math.min(window.innerWidth, window.innerHeight) < 900) aktiveraLokalPad();
  requestAnimationFrame(bildruta);
}

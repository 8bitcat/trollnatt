<script>
'use strict';
/* ===================== NÄT, LOBBY & UPPSTART =====================
   En enhet är värd (stora skärmen). Mobiler ansluter via PeerJS och
   blir handkontroller. Snabba tryck latchas hos värden så de aldrig
   faller mellan två bildrutor. */
const URLQ = new URLSearchParams(location.search);
const HARPEER = typeof window.Peer !== 'undefined';
const ARPEK = 'ontouchstart' in window;
let SIDLAGE = 'vard';
if(URLQ.get('join')) SIDLAGE = 'mobil';
else if(HARPEER && ARPEK && Math.min(window.innerWidth, window.innerHeight) < 620) SIDLAGE = 'val';

const LANK = { roll:'ingen', peer:null, pads:{}, kod:'', oppen:false, nastaIdx:0, senastSkick:0 };
const PUBLIK_URL = 'https://8bitcat.github.io/trollnatt/';
// STUN + TURN-relä (behövs bakom VPN/client isolation — infrastruktur, inte spelkod)
const ISKONF = { config:{ iceServers:[
  { urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302'] },
  { urls:'turn:openrelay.metered.ca:80', username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
  { urls:'turn:openrelay.metered.ca:443?transport=tcp', username:'openrelayproject', credential:'openrelayproject' }
]}};
function gorKod(){
  const A = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s = '';
  for(let i=0;i<4;i++) s += A[(Math.random()*A.length)|0];
  return s;
}
function padIdn(){ return Object.keys(LANK.pads).filter(id=>LANK.pads[id].vid); }

function startVard(){
  if(!HARPEER || LANK.roll==='vard') return;
  LANK.roll = 'vard';
  let forsok = 0;
  const forsoka = ()=>{
    LANK.kod = gorKod();
    const peer = new Peer('trollnatt-'+LANK.kod, ISKONF);
    LANK.peer = peer;
    peer.on('open', ()=>{ LANK.oppen = true; uppdateraQR(); });
    peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
    peer.on('error', fel=>{
      if(fel && fel.type==='unavailable-id' && forsok++ < 5){ try{ peer.destroy(); }catch(e){} forsoka(); }
    });
    peer.on('connection', kanal=>{
      kanal.on('open', ()=>{
        // återanvänd ett dött id om mobilen laddade om
        const upptagna = [...vantar.map(j=>j.pad), ...hjaltar.map(h=>h.pad)];
        let id = upptagna.find(p=>p && p[0]==='n' && (!LANK.pads[p] || !LANK.pads[p].vid));
        if(!id) id = 'n'+(LANK.nastaIdx++);
        LANK.pads[id] = { kanal, vid:true, st:{x:0,y:0,a:false,b:false,c:false} };
        kanal.on('data', d=>{
          if(!d || d.k!=='in' || !LANK.pads[id]) return;
          const st = LANK.pads[id].st;
          const nx = +d.x||0, ny = +d.y||0, na = !!d.a, nb = !!d.b, nc = !!d.c;
          if(na && !st.a) st.aT = true;      // latcha varje nedtryck
          if(nb && !st.b) st.bT = true;
          if(nc && !st.c) st.cT = true;
          if(nx!==0 && st.x===0) st.xT = nx>0?1:-1;
          st.x = nx; st.y = ny; st.a = na; st.b = nb; st.c = nc;
        });
        const tappa = ()=>{ if(LANK.pads[id] && LANK.pads[id].kanal===kanal){
          LANK.pads[id].vid = false; LANK.pads[id].st = {x:0,y:0,a:false,b:false,c:false}; } };
        kanal.on('close', tappa); kanal.on('error', tappa);
      });
    });
  };
  forsoka();
}
function skickaTill(id, m){
  const p = LANK.pads[id];
  if(p && p.vid){ try{ p.kanal.send(m); }catch(e){} }
}
function skickaStatus(){
  if(LANK.roll!=='vard') return;
  const nu = performance.now()/1000;
  if(nu - LANK.senastSkick < 0.3) return;
  LANK.senastSkick = nu;
  for(const id of padIdn()){
    let m = { k:'st', lage:'lobby' };
    const jr = vantar.find(j=>j.pad===id);
    if(jr){
      const ch = HJALTAR_DEF[jr.ci];
      m = { k:'st', lage:'valj', namn:ch.namn, farg:ch.farg, redo:jr.redo, ipl:SPEL.lage!=='lobby' };
    } else {
      const h = hjaltar.find(p=>p.pad===id);
      if(h) m = { k:'st', lage:'spel', namn:h.ch.namn, farg:h.ch.farg,
        hp:Math.max(0,Math.round(h.hp)), maxhp:h.maxhp, dag:SPEL.dag, fas:SPEL.fas,
        nere:h.nere>0, kraft:h.kraftCd<=0, bygg:h.byggPa, slut:SPEL.lage==='slut', seger:SPEL.seger };
    }
    skickaTill(id, m);
  }
}
const qrSkylt = document.getElementById('qrSkylt');
function lankUrl(){
  const bas = location.hostname==='8bitcat.github.io' ? location.origin+location.pathname : PUBLIK_URL;
  return bas + '?join=' + LANK.kod;
}
function uppdateraQR(){
  if(!LANK.oppen) return;
  qrSkylt.innerHTML = '<img width="150" height="150" alt="QR" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=100c14&bgcolor=efe6d0&data='+encodeURIComponent(lankUrl())+'">'
    + '<div style="font-size:12px;margin-top:5px">Skanna med mobilkameran</div>'
    + '<div class="kod">'+LANK.kod.toUpperCase()+'</div>';
}
function qrSync(){
  qrSkylt.style.display = (LANK.oppen && SPEL.lage==='lobby' && SIDLAGE!=='mobil') ? 'block' : 'none';
}

/* ---- mobilsidan ---- */
function kopplaSpak(st, sand){
  const yta = document.getElementById('spakYta');
  const ring = document.getElementById('spakRing'), puck = document.getElementById('spakPuck');
  const tips = document.getElementById('spakTips');
  let pid = null, ox = 0, oy = 0;
  const satt = (el,x,y,s)=>{ el.style.left = (x-s/2)+'px'; el.style.top = (y-s/2)+'px'; };
  yta.addEventListener('pointerdown', e=>{
    if(pid!==null) return;
    pid = e.pointerId;
    try{ yta.setPointerCapture(pid); }catch(err){}
    const r = yta.getBoundingClientRect();
    ox = e.clientX-r.left; oy = e.clientY-r.top;
    tips.style.display = 'none';
    ring.style.display = 'block'; puck.style.display = 'block';
    satt(ring,ox,oy,128); satt(puck,ox,oy,60);
  });
  yta.addEventListener('pointermove', e=>{
    if(e.pointerId!==pid) return;
    const r = yta.getBoundingClientRect();
    let dx = e.clientX-r.left-ox, dy = e.clientY-r.top-oy;
    const d = Math.hypot(dx,dy), max = 58;
    if(d>max){ dx = dx/d*max; dy = dy/d*max; }
    satt(puck, ox+dx, oy+dy, 60);
    const gx = st.x;
    st.x = Math.abs(dx/max)<0.24? 0 : dx/max;
    st.y = Math.abs(dy/max)<0.24? 0 : dy/max;
    if(st.x!==0 && gx===0) st.xT = st.x>0?1:-1;
    sand();
  });
  const slapp = e=>{
    if(e.pointerId!==pid) return;
    pid = null; st.x = 0; st.y = 0;
    ring.style.display = 'none'; puck.style.display = 'none';
    sand();
  };
  yta.addEventListener('pointerup', slapp);
  yta.addEventListener('pointercancel', slapp);
  const knyt = (elId, nyckel)=>{
    const el = document.getElementById(elId);
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); st[nyckel] = true; st[nyckel+'T'] = true; el.classList.add('tryckt'); sand(); vackLjud(); });
    const av = ()=>{ st[nyckel] = false; el.classList.remove('tryckt'); sand(); };
    el.addEventListener('pointerup', av);
    el.addEventListener('pointercancel', av);
    el.addEventListener('pointerleave', av);
  };
  knyt('knA','a'); knyt('knB','b'); knyt('knC','c');
  document.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
  document.addEventListener('gesturestart', e=>e.preventDefault());
}
// lokal pekkontroll ovanpå värdskärmen (spela solo på surfplatta)
let LOKALPAD = false;
function aktiveraLokalPad(){
  if(LOKALPAD || PADSTART) return;
  LOKALPAD = true;
  const padUI = document.getElementById('padUI');
  padUI.classList.add('pahost');
  padUI.style.display = 'flex';
  kopplaSpak(PEKPAD, ()=>{});
}
let PADSTART = false;   // egen flagga — INTE SIDLAGE-koll (vid ?join= är läget redan 'mobil')
function anslutLank(kod){
  if(PADSTART) return;
  PADSTART = true;
  SIDLAGE = 'mobil';
  document.getElementById('stage').style.display = 'none';
  document.getElementById('valUI').style.display = 'none';
  const padUI = document.getElementById('padUI');
  padUI.style.display = 'flex';
  const info = document.getElementById('padInfo');
  const st = {x:0,y:0,a:false,b:false,c:false};
  let kanal = null, koppl = false;
  const sand = ()=>{
    if(koppl){ try{ kanal.send({k:'in', x:Math.round(st.x*100)/100, y:Math.round(st.y*100)/100, a:st.a, b:st.b, c:st.c}); }catch(e){} }
  };
  setInterval(sand, 100);
  info.textContent = 'Ansluter till by '+kod.toUpperCase()+'…';
  const peer = new Peer(ISKONF);
  let forsok = 0;
  peer.on('disconnected', ()=>{ try{ peer.reconnect(); }catch(e){} });
  const koppla = ()=>{
    forsok++;
    kanal = peer.connect('trollnatt-'+kod.toLowerCase(), { reliable:true });
    kanal.on('open', ()=>{ koppl = true; forsok = 0;
      info.innerHTML = '<b style="color:#a8e08a">Ansluten!</b> Tryck YXA för att kliva in i byn.'; });
    kanal.on('data', d=>{
      if(!d || d.k!=='st') return;
      if(d.lage==='lobby') info.innerHTML = 'Ansluten till <b>'+kod.toUpperCase()+'</b> — tryck YXA för att gå med!';
      else if(d.lage==='valj')
        info.innerHTML = '<span style="color:'+d.farg+'">&#9632; '+d.namn+'</span>'
          + (d.ipl ? ' — YXA = hoppa in i byn!'
             : (d.redo ? ' — <b style="color:#a8e08a">REDO!</b> (BYGG = ångra)' : ' — styr &#8592;&#8594; och välj, YXA = redo'));
      else if(d.slut) info.innerHTML = '<b style="color:#ff7a6a">Byn föll…</b> Tryck YXA för nytt försök!';
      else {
        const block = 10, fyllda = d.maxhp? Math.max(0, Math.round(d.hp/d.maxhp*block)) : 0;
        const stapel = '<span style="color:#a8e08a">'+'&#9608;'.repeat(fyllda)+'</span><span style="color:#3a2f4c">'+'&#9608;'.repeat(block-fyllda)+'</span>';
        info.innerHTML = '<span style="color:'+d.farg+'">&#9632; '+d.namn+'</span> '+stapel+' '
          + (d.nere ? '<b style="color:#ff7a6a">NERE! En vän kan hjälpa dig upp.</b>'
             : d.seger ? '<b style="color:#ffd97a">SEGER! Bygg vidare!</b>'
             : d.bygg ? '<b style="color:#a8e08a">BYGGLÄGE</b> — BYGG bläddrar, YXA placerar'
             : (d.fas==='natt' ? '<b style="color:#8fd4ff">NATT '+d.dag+'</b> — försvara byn!'
                : 'Dag '+d.dag+(d.kraft? ' — <b style="color:#8fd4ff">KRAFT redo!</b>':'')));
      }
    });
    kanal.on('close', ()=>{
      if(koppl){ koppl = false; info.innerHTML = '<b style="color:#ff7a6a">Tappade kontakten.</b> Försöker igen…'; setTimeout(koppla, 2000); }
    });
    kanal.on('error', ()=>{});
  };
  const omigen = ()=>{
    if(koppl) return;
    if(forsok < 6){
      info.innerHTML = 'Hittar inte byn <b>'+kod.toUpperCase()+'</b> — försöker igen ('+forsok+'/5)…';
      setTimeout(koppla, 2500);
    } else {
      info.innerHTML = '<b style="color:#ff7a6a">Kunde inte ansluta.</b> Kolla koden och att spelet är igång på stora skärmen — ladda sedan om.';
    }
  };
  peer.on('open', koppla);
  peer.on('error', fel=>{
    if(fel && fel.type==='peer-unavailable') omigen();
    else if(!koppl && forsok>0 && fel && fel.type!=='disconnected') omigen();
  });
  kopplaSpak(st, sand);
}

/* ---- lobby ---- */
function nyVantare(pad){
  if(vantar.some(j=>j.pad===pad) || hjaltar.some(h=>h.pad===pad)) return null;
  const jr = { pad, ci: vantar.length%HJALTAR_DEF.length, redo:false, px:0, farsk:true };
  vantar.push(jr); spela('valj');
  return jr;
}
function skannaNyaPads(){
  for(const id of padIdn()) nyVantare(id);
  if(TLATCH.a && !vantar.some(j=>j.pad==='kb') && !hjaltar.some(h=>h.pad==='kb')){
    TLATCH.a = false; nyVantare('kb');
  }
  if(LOKALPAD && PEKPAD.aT && !vantar.some(j=>j.pad==='lokal') && !hjaltar.some(h=>h.pad==='lokal')){
    PEKPAD.aT = false; nyVantare('lokal');
  }
  for(const gp of gpCache) if(gp.aT && !vantar.some(j=>j.pad===gp.id) && !hjaltar.some(h=>h.pad===gp.id)) nyVantare(gp.id);
  vantar = vantar.filter(j=> j.pad[0]!=='n' || (LANK.pads[j.pad] && LANK.pads[j.pad].vid));
}
function uppdVantare(jr, ipl){
  const inp = lasInput(jr.pad);
  let steg = 0;
  if(inp.xT) steg = inp.xT;
  else { if(inp.x>0.5 && jr.px<=0.5) steg = 1; if(inp.x<-0.5 && jr.px>=-0.5) steg = -1; }
  jr.px = inp.x;
  if(!jr.redo && steg){ jr.ci = (jr.ci+steg+HJALTAR_DEF.length)%HJALTAR_DEF.length; spela('valj'); }
  if(inp.aT){
    if(ipl){
      const h = gorHjalte(jr.ci, jr.pad, hjaltar.length);
      hjaltar.push(h);
      vantar = vantar.filter(q=>q!==jr);
      svavText(h.x, h.y-34, h.ch.namn+' KLIVER IN!', h.ch.farg, true);
      spela('redo');
      return;
    }
    jr.redo = !jr.redo; spela('redo');
  }
  if(inp.bT && !ipl) jr.redo = false;
}
function uppdLobby(dt){
  tid += dt;
  sattLat('lobby');
  skannaNyaPads();
  for(const jr of vantar){
    if(jr.farsk){ jr.farsk = false; continue; }
    uppdVantare(jr, false);
  }
  if(vantar.length>0 && vantar.every(j=>j.redo)){
    if(SPEL.startT<0) SPEL.startT = 3.2;
    SPEL.startT -= dt;
    if(SPEL.startT<=0){
      hjaltar = vantar.map((j,i)=>gorHjalte(j.ci, j.pad, i));
      vantar = []; SPEL.startT = -1;
      spela('fanfar');
      startSpel();
    }
  } else SPEL.startT = -1;
}

/* ---- bildrutan ---- */
let forraT = performance.now();
function bildruta(nu){
  const dt = Math.min(0.05, (nu-forraT)/1000);
  forraT = nu;
  // en enskild trasig bildruta får aldrig döda spelet
  try{
    gpCache = pollGamepads();
    if(SPEL.lage==='lobby') uppdLobby(dt);
    else {
      uppdSpel(dt);
      // nya spelare kan hoppa in mitt i spelet
      skannaNyaPads();
      for(const jr of vantar){ if(jr.farsk){ jr.farsk = false; continue; } uppdVantare(jr, true); }
    }
    musikPuls();
    skickaStatus();
  }catch(e){ console.error('uppd:', e); }
  try{ ritaAllt(); qrSync(); }catch(e){ console.error('rita:', e); }
  requestAnimationFrame(bildruta);
}

/* ---- felsökningskrokar (används av våra Playwright-tester) ---- */
window.TN = {
  status: ()=>({ lage:SPEL.lage, dag:SPEL.dag, fas:SPEL.fas, tidKvar:Math.round(SPEL.tidKvar||0),
    res:{...RES}, smide:{...SMIDE}, vantar:vantar.length,
    hjaltar:hjaltar.map(h=>({id:h.ch.id, x:Math.round(h.x), y:Math.round(h.y), hp:Math.round(h.hp), nere:h.nere>0, byggPa:h.byggPa})),
    folk:folket.length, mobbar:mobbar.length, byggnader:byggnader.filter(b=>b).length,
    ko:SPEL.natt && SPEL.natt.ko? SPEL.natt.ko.length : 0 }),
  ge: o=>Object.assign(RES, o),
  start: cis=>{ hjaltar = (cis||[0]).map((ci,i)=>gorHjalte(ci,'dbg'+i,i)); vantar = []; startSpel(); },
  natt: ()=>{ SPEL.tidKvar = 0.01; },
  gryning: ()=>{ if(SPEL.natt.ko) SPEL.natt.ko = []; startGryning(); },
  dag: ()=>{ mobbar = []; if(SPEL.natt.ko) SPEL.natt.ko = []; startDag(SPEL.dag+1); },
  sattDag: n=>{ SPEL.dag = n; },
  bygg: (typ,tx,ty)=>placeraBygg(typ,tx,ty,true),
  spawn: (slag,n)=>{ for(let i=0;i<(n||1);i++){ const [x,y] = kantPos('N'); gorMob(slag||'vatte', x, y); } },
  boss: ()=>gorMob('kung', PXW/2, 4*TS),
  doda: ()=>{ for(const m of [...mobbar]) dodaMob(m, true); },
  folkNu: n=>{ for(let i=0;i<(n||1);i++) foddFolk(); },
  folkInfo: ()=>folket.map(f=>({x:Math.round(f.x), y:Math.round(f.y), jobb:f.jobb, fas:f.fas,
    barN:f.barN, mal:f.mal, rutt:f.rutt? f.rutt.length : null, vantaT:Math.round(f.vantaT*10)/10, gomd:f.gomd})),
  lank: LANK, spel: SPEL,
};

/* ---- uppstart ---- */
if(SIDLAGE==='mobil'){
  anslutLank(URLQ.get('join'));
} else if(SIDLAGE==='val'){
  const valUI = document.getElementById('valUI');
  valUI.style.display = 'flex';
  // pointerup + click med dubbeltrycksskydd — iOS kan svälja rena click-händelser
  const peka = (el, fn)=>{
    let sen = 0;
    const h = e=>{ const nu = performance.now(); if(nu-sen<400) return; sen = nu; fn(e); };
    el.addEventListener('pointerup', h);
    el.addEventListener('click', h);
  };
  peka(document.getElementById('valAnslut'), ()=>{
    document.getElementById('valAnslut').style.display = 'none';
    document.getElementById('kodDel').style.display = 'flex';
    document.getElementById('kodFalt').focus();
  });
  const kor = ()=>{
    const kod = document.getElementById('kodFalt').value.trim();
    if(kod.length===4) anslutLank(kod);
  };
  peka(document.getElementById('kodGo'), kor);
  document.getElementById('kodFalt').addEventListener('keydown', e=>{ if(e.key==='Enter') kor(); });
  let vardStartad = false;
  peka(document.getElementById('valHost'), ()=>{
    if(vardStartad) return; vardStartad = true;
    valUI.style.display = 'none';
    startVard();
    if(ARPEK) aktiveraLokalPad();
    forraT = performance.now();
    requestAnimationFrame(bildruta);
  });
} else {
  startVard();
  if(ARPEK && Math.min(window.innerWidth, window.innerHeight) < 900) aktiveraLokalPad();
  requestAnimationFrame(bildruta);
}
</script>
